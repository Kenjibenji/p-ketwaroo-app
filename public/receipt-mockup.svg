<svg xmlns="http://www.w3.org/2000/svg" width="420" height="720" viewBox="0 0 420 720" font-family="-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif">
  <!-- soft paper -->
  <rect x="10" y="10" width="400" height="700" fill="#fcfcf8" stroke="#e6e4dc" stroke-width="1"/>

  <!-- ============ HEADER ============ -->
  <text x="210" y="48" text-anchor="middle" font-size="20" font-weight="700" fill="#1a1a1a" letter-spacing="-0.3">P. Ketwaroo &amp; Sons</text>

  <!-- order meta row -->
  <text x="30" y="78" font-size="12" fill="#6b6b6b">Order #045 — May 6, 2026</text>

  <!-- customer -->
  <text x="30" y="106" font-size="13" fill="#1a1a1a">
    <tspan fill="#6b6b6b">For: </tspan>
    <tspan font-weight="600">J and G Supermarket</tspan>
  </text>

  <!-- soft divider -->
  <line x1="30" y1="124" x2="390" y2="124" stroke="#e0ddd1" stroke-width="1"/>

  <!-- ============ LINE ITEMS ============ -->

  <!-- item 1: all picked up -->
  <text x="58" y="156" text-anchor="end" font-size="13" font-weight="600" fill="#1a1a1a">5</text>
  <text x="74" y="156" font-size="13" fill="#1a1a1a">Coca-Cola 12oz Cans</text>
  <text x="390" y="156" text-anchor="end" font-size="13" font-weight="600" fill="#1a1a1a">$35.00</text>
  <text x="74" y="172" font-size="11" fill="#3a8a4f">✓ all picked up</text>

  <!-- item 2: all picked up -->
  <text x="58" y="200" text-anchor="end" font-size="13" font-weight="600" fill="#1a1a1a">12</text>
  <text x="74" y="200" font-size="13" fill="#1a1a1a">Stag Beer 6-Pack</text>
  <text x="390" y="200" text-anchor="end" font-size="13" font-weight="600" fill="#1a1a1a">$96.00</text>
  <text x="74" y="216" font-size="11" fill="#3a8a4f">✓ all picked up</text>

  <!-- item 3: partial -->
  <text x="58" y="244" text-anchor="end" font-size="13" font-weight="600" fill="#1a1a1a">3</text>
  <text x="74" y="244" font-size="13" fill="#1a1a1a">Doubles Pkg</text>
  <text x="390" y="244" text-anchor="end" font-size="13" font-weight="600" fill="#1a1a1a">$12.00</text>
  <text x="74" y="260" font-size="11" fill="#a06b1c">• 2 picked up · 1 to deliver</text>

  <!-- item 4: to deliver -->
  <text x="58" y="288" text-anchor="end" font-size="13" font-weight="600" fill="#1a1a1a">10</text>
  <text x="74" y="288" font-size="13" fill="#1a1a1a">KFC Crackers</text>
  <text x="390" y="288" text-anchor="end" font-size="13" font-weight="600" fill="#1a1a1a">$50.00</text>
  <text x="74" y="304" font-size="11" fill="#a06b1c">→ to deliver</text>

  <!-- item 5: to deliver -->
  <text x="58" y="332" text-anchor="end" font-size="13" font-weight="600" fill="#1a1a1a">4</text>
  <text x="74" y="332" font-size="13" fill="#1a1a1a">Snickers 24-pk</text>
  <text x="390" y="332" text-anchor="end" font-size="13" font-weight="600" fill="#1a1a1a">$48.00</text>
  <text x="74" y="348" font-size="11" fill="#a06b1c">→ to deliver</text>

  <!-- divider -->
  <line x1="30" y1="372" x2="390" y2="372" stroke="#bbb6a4" stroke-width="1"/>

  <!-- ============ TOTAL ============ -->
  <text x="30" y="402" font-size="15" fill="#1a1a1a">Total</text>
  <text x="390" y="402" text-anchor="end" font-size="20" font-weight="700" fill="#1a1a1a">$241.00</text>

  <line x1="30" y1="420" x2="390" y2="420" stroke="#bbb6a4" stroke-width="1"/>

  <!-- ============ PAYMENT ============ -->
  <text x="30" y="452" font-size="12" fill="#6b6b6b">Payment</text>
  <text x="30" y="472" font-size="13" fill="#1a1a1a">
    <tspan font-weight="600">$100.00 paid</tspan>
    <tspan fill="#6b6b6b"> · </tspan>
    <tspan font-weight="600" fill="#b03a3a">$141.00 balance</tspan>
  </text>

  <!-- ============ DELIVERY STATUS ============ -->
  <text x="30" y="506" font-size="12" fill="#6b6b6b">Delivery</text>
  <text x="30" y="526" font-size="13" font-weight="600" fill="#a06b1c">15 items to deliver</text>

  <!-- ============ FOOTER NOTE (super light) ============ -->
  <text x="210" y="668" text-anchor="middle" font-size="10" fill="#a0a0a0">— P. Ketwaroo &amp; Sons —</text>
</svg>
