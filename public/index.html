<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>P. Ketwaroo Inventory System</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0b0d18;color:#c8cde8;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh}
button{cursor:pointer;border:none;font-family:inherit;font-size:14px}
input,select{font-family:inherit;font-size:14px}

/* header */
.app-header{background:#0f1222;border-bottom:1px solid #252840;padding:16px 24px}
.header-logo{font-size:20px;font-weight:700;color:#fff}
.header-sub{font-size:12px;color:#5a6080;margin-top:2px}

/* nav */
.app-nav{background:#0f1222;border-bottom:1px solid #252840;padding:0 24px}
.nav-inner{display:flex;gap:4px}
.nav-tab{background:none;color:#5a6080;padding:12px 16px;border-bottom:2px solid transparent;transition:all .15s}
.nav-tab:hover{color:#c8cde8}
.nav-tab-active{color:#5b8ff0;border-bottom-color:#5b8ff0}

/* main */
.app-main{padding:24px;max-width:1100px;margin:0 auto}

/* cards */
.card{background:#13162a;border:1px solid #252840;border-radius:8px;padding:20px;margin-bottom:20px}

/* stats */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;margin-bottom:24px}
.stat-card{background:#13162a;border:1px solid #252840;border-radius:8px;padding:16px;display:flex;align-items:center;gap:14px;border-left:3px solid transparent}
.stat-card.blue{border-left-color:#5b8ff0}.stat-card.green{border-left-color:#2dc875}
.stat-card.amber{border-left-color:#f0a820}.stat-card.red{border-left-color:#e05252}
.stat-icon{font-size:24px}
.stat-value{font-size:22px;font-weight:700;color:#fff}
.stat-label{font-size:12px;color:#5a6080;margin-top:2px}

/* form */
.form-row{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:12px}
.form-group{display:flex;flex-direction:column;gap:6px;flex:1;min-width:120px}
.form-group label{font-size:12px;color:#5a6080;font-weight:500}
.form-control{background:#0b0d18;border:1px solid #252840;border-radius:6px;padding:8px 12px;color:#c8cde8;outline:none;width:100%}
.form-control:focus{border-color:#5b8ff0}

/* buttons */
.btn{padding:8px 16px;border-radius:6px;font-weight:500;transition:opacity .15s}
.btn:hover{opacity:.85}
.btn-primary{background:#5b8ff0;color:#fff}
.btn-success{background:#2dc875;color:#fff}
.btn-danger{background:#e05252;color:#fff}
.btn-ghost{background:#252840;color:#c8cde8}
.btn-sm{padding:5px 10px;font-size:12px}
.btn-xs{padding:3px 8px;font-size:11px}
.btn-group{display:flex;gap:8px;flex-wrap:wrap}

/* table */
table{width:100%;border-collapse:collapse}
th{text-align:left;font-size:12px;color:#5a6080;font-weight:500;padding:8px 12px;border-bottom:1px solid #252840}
td{padding:10px 12px;border-bottom:1px solid #1a1e35;font-size:14px;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr.low-stock td{background:#1a1210}

/* badges */
.badge{display:inline-block;padding:3px 8px;border-radius:4px;font-size:11px;font-weight:600}
.badge-pending{background:#3a2e10;color:#f0a820}
.badge-loaded{background:#0e2e1e;color:#2dc875}
.badge-out{background:#2e1010;color:#e05252}
.badge-critical{background:#2e1010;color:#e05252}
.badge-low{background:#3a2e10;color:#f0a820}

/* pills */
.pill-bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.pill{padding:5px 14px;border-radius:20px;font-size:12px;font-weight:500;background:#1a1e35;color:#5a6080;cursor:pointer;border:1px solid transparent}
.pill:hover{color:#c8cde8}
.pill.active{background:#1e2d4a;color:#5b8ff0;border-color:#5b8ff0}

/* search */
.search-bar{position:relative;margin-bottom:16px}
.search-bar input{width:100%;background:#0b0d18;border:1px solid #252840;border-radius:6px;padding:9px 12px 9px 36px;color:#c8cde8;outline:none}
.search-bar input:focus{border-color:#5b8ff0}
.search-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:#5a6080;font-size:14px}

/* order card */
.order-card{background:#0f1222;border:1px solid #252840;border-radius:8px;margin-bottom:12px}
.order-header{display:flex;justify-content:space-between;align-items:center;padding:14px 16px;cursor:pointer}
.order-header:hover{background:#13162a}
.order-meta{font-size:12px;color:#5a6080;margin-top:3px}
.order-body{padding:0 16px 16px}
.checklist-item{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid #1a1e35;font-size:14px}
.checklist-item:last-child{border-bottom:none}
.checklist-item.checked span{text-decoration:line-through;color:#5a6080}
.checklist-item input[type=checkbox]{width:16px;height:16px;accent-color:#2dc875;cursor:pointer}

/* autocomplete */
.autocomplete{position:relative}
.autocomplete-list{position:absolute;top:100%;left:0;right:0;background:#1a1e35;border:1px solid #252840;border-radius:6px;z-index:100;max-height:160px;overflow-y:auto}
.autocomplete-item{padding:9px 12px;cursor:pointer;font-size:14px}
.autocomplete-item:hover{background:#252840}

/* order items in create */
.order-item-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid #1a1e35}
.order-item-row:last-child{border-bottom:none}
.qty-btn{width:28px;height:28px;border-radius:4px;background:#252840;color:#c8cde8;font-size:16px;display:flex;align-items:center;justify-content:center}
.qty-btn:hover{background:#5b8ff0;color:#fff}
.order-total-bar{background:#0f1222;border-radius:6px;padding:14px 16px;margin-top:12px;display:flex;justify-content:space-between;align-items:center}
.total-label{color:#5a6080;font-size:13px}
.total-value{font-size:20px;font-weight:700;color:#fff}

/* toast */
.toast-container{position:fixed;top:20px;right:20px;z-index:999;display:flex;flex-direction:column;gap:8px}
.toast{padding:12px 18px;border-radius:8px;font-size:14px;font-weight:500;cursor:pointer;min-width:200px;max-width:320px;animation:slideIn .2s ease}
.toast-success{background:#0e2e1e;color:#2dc875;border:1px solid #2dc875}
.toast-error{background:#2e1010;color:#e05252;border:1px solid #e05252}
.toast-info{background:#1e2d4a;color:#5b8ff0;border:1px solid #5b8ff0}
@keyframes slideIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}

/* modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:900;display:flex;align-items:center;justify-content:center}
.modal{background:#13162a;border:1px solid #252840;border-radius:10px;padding:24px;min-width:300px;max-width:440px}
.modal p{margin-bottom:20px;line-height:1.6}
.modal-actions{display:flex;gap:10px;justify-content:flex-end}

/* section title */
.section-title{font-size:16px;font-weight:600;color:#fff;margin-bottom:16px}
.section-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}

/* recent orders in dashboard */
.recent-order-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid #1a1e35;font-size:14px}
.recent-order-row:last-child{border-bottom:none}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;

// ── Toast ──────────────────────────────────────────────────
function useToast() {
  const [toasts, setToasts] = useState([]);
  const id = useRef(0);
  const show = useCallback((message, type = 'info') => {
    const tid = ++id.current;
    setToasts(p => [...p, { id: tid, message, type }]);
    setTimeout(() => setToasts(p => p.filter(t => t.id !== tid)), 3000);
  }, []);
  return { toasts, show, dismiss: tid => setToasts(p => p.filter(t => t.id !== tid)) };
}

function Toast({ toasts, dismiss }) {
  return (
    <div className="toast-container">
      {toasts.map(t => (
        <div key={t.id} className={`toast toast-${t.type}`} onClick={() => dismiss(t.id)}>
          {t.message}
        </div>
      ))}
    </div>
  );
}

// ── Confirm modal ──────────────────────────────────────────
function useConfirm() {
  const [state, setState] = useState(null);
  const confirm = msg => new Promise(res => setState({ msg, res }));
  const ok  = () => { state.res(true);  setState(null); };
  const no  = () => { state.res(false); setState(null); };
  const modal = state ? (
    <div className="modal-overlay">
      <div className="modal">
        <p>{state.msg}</p>
        <div className="modal-actions">
          <button className="btn btn-danger" onClick={ok}>Delete</button>
          <button className="btn btn-ghost"  onClick={no}>Cancel</button>
        </div>
      </div>
    </div>
  ) : null;
  return { confirm, modal };
}

// ── Helpers ────────────────────────────────────────────────
const fmt = n => parseFloat(n || 0).toFixed(2);
const TAX_RATE = 0.15;

function parseItems(items) {
  if (Array.isArray(items)) return items;
  try { return JSON.parse(items); } catch { return []; }
}

function StatusBadge({ status }) {
  return <span className={`badge badge-${status}`}>{status === 'loaded' ? 'Loaded' : 'Pending'}</span>;
}

function StockBadge({ stock }) {
  if (stock === 0)  return <span className="badge badge-out">Out</span>;
  if (stock < 5)   return <span className="badge badge-critical">{stock}</span>;
  if (stock < 10)  return <span className="badge badge-low">{stock}</span>;
  return <span>{stock}</span>;
}

// ── Dashboard ──────────────────────────────────────────────
function DashboardTab({ stats, orders, onTabChange }) {
  const recent = orders.slice(0, 5);
  return (
    <div>
      <div className="stats-grid">
        <div className="stat-card blue">
          <div className="stat-icon">📦</div>
          <div><div className="stat-value">{stats.todayOrders ?? 0}</div><div className="stat-label">Orders Today</div></div>
        </div>
        <div className="stat-card amber">
          <div className="stat-icon">⏳</div>
          <div><div className="stat-value">{stats.pendingOrders ?? 0}</div><div className="stat-label">Pending</div></div>
        </div>
        <div className="stat-card red">
          <div className="stat-icon">⚠️</div>
          <div><div className="stat-value">{stats.lowStockCount ?? 0}</div><div className="stat-label">Low Stock</div></div>
        </div>
        <div className="stat-card green">
          <div className="stat-icon">💰</div>
          <div><div className="stat-value">${fmt(stats.todayRevenue)}</div><div className="stat-label">Revenue Today</div></div>
        </div>
      </div>

      <div className="card">
        <div className="section-row">
          <div className="section-title">Recent Orders</div>
          <button className="btn btn-ghost btn-sm" onClick={() => onTabChange('orders')}>View All</button>
        </div>
        {recent.length === 0 ? (
          <p style={{color:'#5a6080',fontSize:14}}>No orders yet.</p>
        ) : recent.map(o => (
          <div key={o.id} className="recent-order-row">
            <div>
              <div style={{fontWeight:500}}>{o.customer_name}</div>
              <div style={{fontSize:12,color:'#5a6080'}}>{new Date(o.created_at).toLocaleDateString()}</div>
            </div>
            <div style={{display:'flex',gap:10,alignItems:'center'}}>
              <StatusBadge status={o.status || 'pending'} />
              <span style={{fontWeight:600}}>${fmt(o.total)}</span>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

// ── Products ───────────────────────────────────────────────
function ProductsTab({ products, onRefresh, toast, confirm }) {
  const [form, setForm] = useState({ name:'', category:'', price:'', stock:'' });
  const [editId, setEditId] = useState(null);
  const [search, setSearch] = useState('');
  const [catFilter, setCatFilter] = useState('All');

  const categories = ['All', ...Array.from(new Set(products.map(p => p.category).filter(Boolean)))];

  const filtered = products.filter(p => {
    const matchSearch = p.name.toLowerCase().includes(search.toLowerCase());
    const matchCat = catFilter === 'All' || p.category === catFilter;
    return matchSearch && matchCat;
  });

  function startEdit(p) {
    setEditId(p.id);
    setForm({ name: p.name, category: p.category, price: p.price, stock: p.stock });
  }
  function cancelEdit() { setEditId(null); setForm({ name:'', category:'', price:'', stock:'' }); }

  async function save(e) {
    e.preventDefault();
    if (!form.name || !form.category || form.price === '' || form.stock === '') {
      return toast('All fields required', 'error');
    }
    const url = editId ? `/api/products/${editId}` : '/api/products';
    const method = editId ? 'PUT' : 'POST';
    try {
      const res = await fetch(url, {
        method,
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name: form.name, category: form.category, price: parseFloat(form.price), stock: parseInt(form.stock) }),
      });
      const data = await res.json();
      if (!res.ok) return toast(data.error || 'Failed', 'error');
      toast(editId ? 'Product updated' : 'Product added', 'success');
      cancelEdit();
      onRefresh();
    } catch { toast('Network error', 'error'); }
  }

  async function del(id, name) {
    const yes = await confirm(`Delete "${name}"?`);
    if (!yes) return;
    try {
      const res = await fetch(`/api/products/${id}`, { method: 'DELETE' });
      if (!res.ok) return toast('Failed to delete', 'error');
      toast('Product deleted', 'success');
      onRefresh();
    } catch { toast('Network error', 'error'); }
  }

  return (
    <div>
      <div className="card">
        <div className="section-title">{editId ? 'Edit Product' : 'Add Product'}</div>
        <form onSubmit={save}>
          <div className="form-row">
            <div className="form-group">
              <label>Name</label>
              <input className="form-control" value={form.name} onChange={e => setForm(f => ({...f, name: e.target.value}))} placeholder="Product name"/>
            </div>
            <div className="form-group">
              <label>Category</label>
              <input className="form-control" value={form.category} onChange={e => setForm(f => ({...f, category: e.target.value}))} placeholder="e.g. Beverages"/>
            </div>
            <div className="form-group" style={{maxWidth:120}}>
              <label>Price ($)</label>
              <input className="form-control" type="number" step="0.01" min="0" value={form.price} onChange={e => setForm(f => ({...f, price: e.target.value}))} placeholder="0.00"/>
            </div>
            <div className="form-group" style={{maxWidth:100}}>
              <label>Stock</label>
              <input className="form-control" type="number" min="0" value={form.stock} onChange={e => setForm(f => ({...f, stock: e.target.value}))} placeholder="0"/>
            </div>
          </div>
          <div className="btn-group">
            <button type="submit" className="btn btn-primary">{editId ? 'Update' : 'Add Product'}</button>
            {editId && <button type="button" className="btn btn-ghost" onClick={cancelEdit}>Cancel</button>}
          </div>
        </form>
      </div>

      <div className="card">
        <div className="search-bar">
          <span className="search-icon">🔍</span>
          <input value={search} onChange={e => setSearch(e.target.value)} placeholder="Search products…"/>
        </div>
        <div className="pill-bar">
          {categories.map(c => (
            <div key={c} className={`pill ${catFilter === c ? 'active' : ''}`} onClick={() => setCatFilter(c)}>{c}</div>
          ))}
        </div>
        <table>
          <thead>
            <tr><th>Name</th><th>Category</th><th>Price</th><th>Stock</th><th></th></tr>
          </thead>
          <tbody>
            {filtered.length === 0 && (
              <tr><td colSpan={5} style={{color:'#5a6080',textAlign:'center',padding:20}}>No products found</td></tr>
            )}
            {filtered.map(p => (
              <tr key={p.id} className={p.stock < 10 ? 'low-stock' : ''}>
                <td style={{fontWeight:500}}>{p.name}</td>
                <td style={{color:'#5a6080'}}>{p.category}</td>
                <td>${fmt(p.price)}</td>
                <td><StockBadge stock={p.stock}/></td>
                <td>
                  <div className="btn-group">
                    <button className="btn btn-ghost btn-xs" onClick={() => startEdit(p)}>Edit</button>
                    <button className="btn btn-danger btn-xs" onClick={() => del(p.id, p.name)}>Delete</button>
                  </div>
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </div>
  );
}

// ── Create Order ───────────────────────────────────────────
function CreateOrderTab({ products, customers, onOrderCreated, toast }) {
  const [customer, setCustomer] = useState('');
  const [showSuggestions, setShowSuggestions] = useState(false);
  const [productSearch, setProductSearch] = useState('');
  const [showProducts, setShowProducts] = useState(false);
  const [items, setItems] = useState([]);

  const suggestions = customers.filter(c => c.toLowerCase().includes(customer.toLowerCase()) && customer.length > 0);
  const productMatches = products.filter(p => p.name.toLowerCase().includes(productSearch.toLowerCase()) && productSearch.length > 0 && p.stock > 0);

  function addItem(product) {
    setItems(prev => {
      const exists = prev.find(i => i.id === product.id);
      if (exists) return prev.map(i => i.id === product.id ? { ...i, quantity: i.quantity + 1 } : i);
      return [...prev, { id: product.id, name: product.name, price: product.price, quantity: 1 }];
    });
    setProductSearch('');
    setShowProducts(false);
  }

  function changeQty(id, delta) {
    setItems(prev => prev.map(i => i.id === id ? { ...i, quantity: Math.max(1, i.quantity + delta) } : i).filter(i => i.quantity > 0));
  }

  function removeItem(id) { setItems(prev => prev.filter(i => i.id !== id)); }

  const subtotal = items.reduce((s, i) => s + i.price * i.quantity, 0);
  const tax = subtotal * TAX_RATE;
  const total = subtotal + tax;

  async function submitOrder() {
    if (!customer.trim()) return toast('Customer name required', 'error');
    if (items.length === 0) return toast('Add at least one item', 'error');
    try {
      const res = await fetch('/api/orders', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ customer_name: customer.trim(), items, subtotal, tax, total }),
      });
      const data = await res.json();
      if (!res.ok) return toast(data.error || 'Failed to create order', 'error');
      toast('Order created!', 'success');
      setCustomer(''); setItems([]);
      onOrderCreated();
    } catch { toast('Network error', 'error'); }
  }

  return (
    <div className="card">
      <div className="section-title">New Order</div>

      <div className="form-group" style={{marginBottom:16}}>
        <label>Customer Name</label>
        <div className="autocomplete">
          <input
            className="form-control"
            value={customer}
            onChange={e => { setCustomer(e.target.value); setShowSuggestions(true); }}
            onBlur={() => setTimeout(() => setShowSuggestions(false), 150)}
            placeholder="Type customer name…"
          />
          {showSuggestions && suggestions.length > 0 && (
            <div className="autocomplete-list">
              {suggestions.map(s => (
                <div key={s} className="autocomplete-item" onMouseDown={() => { setCustomer(s); setShowSuggestions(false); }}>{s}</div>
              ))}
            </div>
          )}
        </div>
      </div>

      <div className="form-group" style={{marginBottom:16}}>
        <label>Add Product</label>
        <div className="autocomplete">
          <input
            className="form-control"
            value={productSearch}
            onChange={e => { setProductSearch(e.target.value); setShowProducts(true); }}
            onBlur={() => setTimeout(() => setShowProducts(false), 150)}
            placeholder="Search products…"
          />
          {showProducts && productMatches.length > 0 && (
            <div className="autocomplete-list">
              {productMatches.map(p => (
                <div key={p.id} className="autocomplete-item" onMouseDown={() => addItem(p)}>
                  {p.name} — ${fmt(p.price)} <span style={{color:'#5a6080'}}>(stock: {p.stock})</span>
                </div>
              ))}
            </div>
          )}
        </div>
      </div>

      {items.length > 0 && (
        <div style={{marginTop:8}}>
          {items.map(i => (
            <div key={i.id} className="order-item-row">
              <div style={{flex:1,fontWeight:500}}>{i.name}</div>
              <div style={{color:'#5a6080',fontSize:13,marginRight:12}}>${fmt(i.price)} ea</div>
              <button className="qty-btn" onClick={() => changeQty(i.id, -1)}>−</button>
              <span style={{minWidth:28,textAlign:'center',fontWeight:600}}>{i.quantity}</span>
              <button className="qty-btn" onClick={() => changeQty(i.id, +1)}>+</button>
              <div style={{minWidth:70,textAlign:'right',fontWeight:600}}>${fmt(i.price * i.quantity)}</div>
              <button className="btn btn-danger btn-xs" style={{marginLeft:8}} onClick={() => removeItem(i.id)}>✕</button>
            </div>
          ))}
          <div className="order-total-bar">
            <div>
              <div className="total-label">Subtotal: ${fmt(subtotal)} · Tax (15%): ${fmt(tax)}</div>
            </div>
            <div>
              <span className="total-label" style={{marginRight:8}}>Total</span>
              <span className="total-value">${fmt(total)}</span>
            </div>
          </div>
          <div style={{marginTop:16}}>
            <button className="btn btn-success" onClick={submitOrder}>Place Order</button>
          </div>
        </div>
      )}
    </div>
  );
}

// ── Orders ─────────────────────────────────────────────────
function OrdersTab({ orders, onRefresh, toast, confirm }) {
  const [search, setSearch] = useState('');
  const [statusFilter, setStatusFilter] = useState('all');
  const [expanded, setExpanded] = useState(null);
  const [localOrders, setLocalOrders] = useState(orders);

  useEffect(() => setLocalOrders(orders), [orders]);

  const filtered = localOrders.filter(o => {
    const matchSearch = o.customer_name.toLowerCase().includes(search.toLowerCase());
    const matchStatus = statusFilter === 'all' || o.status === statusFilter;
    return matchSearch && matchStatus;
  });

  async function toggleItem(order, idx) {
    const items = parseItems(order.items).map((it, i) => i === idx ? { ...it, loaded: !it.loaded } : it);
    const allLoaded = items.every(it => it.loaded);
    const newStatus = allLoaded ? 'loaded' : 'pending';

    setLocalOrders(prev => prev.map(o => o.id === order.id ? { ...o, items: JSON.stringify(items), status: newStatus } : o));

    try {
      const res = await fetch(`/api/orders/${order.id}/items`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ items, status: newStatus }),
      });
      if (!res.ok) { toast('Failed to update', 'error'); onRefresh(); }
    } catch { toast('Network error', 'error'); onRefresh(); }
  }

  async function markAllLoaded(order) {
    const items = parseItems(order.items).map(it => ({ ...it, loaded: true }));
    setLocalOrders(prev => prev.map(o => o.id === order.id ? { ...o, items: JSON.stringify(items), status: 'loaded' } : o));
    try {
      await fetch(`/api/orders/${order.id}/items`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ items, status: 'loaded' }),
      });
      toast('Order marked as loaded', 'success');
    } catch { toast('Network error', 'error'); onRefresh(); }
  }

  async function del(id) {
    const yes = await confirm('Delete this order?');
    if (!yes) return;
    try {
      const res = await fetch(`/api/orders/${id}`, { method: 'DELETE' });
      if (!res.ok) return toast('Failed to delete', 'error');
      toast('Order deleted', 'success');
      onRefresh();
    } catch { toast('Network error', 'error'); }
  }

  return (
    <div>
      <div className="search-bar">
        <span className="search-icon">🔍</span>
        <input value={search} onChange={e => setSearch(e.target.value)} placeholder="Search by customer…"/>
      </div>
      <div className="pill-bar">
        {['all','pending','loaded'].map(s => (
          <div key={s} className={`pill ${statusFilter === s ? 'active' : ''}`} onClick={() => setStatusFilter(s)}>
            {s === 'all' ? 'All' : s === 'pending' ? 'Pending' : 'Loaded'}
          </div>
        ))}
      </div>

      {filtered.length === 0 && <p style={{color:'#5a6080',fontSize:14}}>No orders found.</p>}

      {filtered.map(order => {
        const items = parseItems(order.items);
        const isExpanded = expanded === order.id;
        const allLoaded = items.length > 0 && items.every(i => i.loaded);
        return (
          <div key={order.id} className="order-card">
            <div className="order-header" onClick={() => setExpanded(isExpanded ? null : order.id)}>
              <div>
                <div style={{fontWeight:600,fontSize:15}}>{order.customer_name}</div>
                <div className="order-meta">
                  {new Date(order.created_at).toLocaleDateString()} · {items.length} item{items.length !== 1 ? 's' : ''} · ${fmt(order.total)}
                </div>
              </div>
              <div style={{display:'flex',gap:10,alignItems:'center'}}>
                <StatusBadge status={order.status || 'pending'}/>
                <span style={{color:'#5a6080'}}>{isExpanded ? '▲' : '▼'}</span>
              </div>
            </div>

            {isExpanded && (
              <div className="order-body">
                <div style={{marginBottom:12}}>
                  {items.map((it, idx) => (
                    <div key={idx} className={`checklist-item ${it.loaded ? 'checked' : ''}`}>
                      <input type="checkbox" checked={!!it.loaded} onChange={() => toggleItem(order, idx)}/>
                      <span style={{flex:1}}>{it.name}</span>
                      <span style={{color:'#5a6080',fontSize:13}}>×{it.quantity}</span>
                      <span style={{fontWeight:600,minWidth:60,textAlign:'right'}}>${fmt(it.price * it.quantity)}</span>
                    </div>
                  ))}
                </div>
                <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
                  {!allLoaded && (
                    <button className="btn btn-success btn-sm" onClick={() => markAllLoaded(order)}>Mark All Loaded</button>
                  )}
                  <button className="btn btn-danger btn-sm" onClick={() => del(order.id)}>Delete Order</button>
                </div>
              </div>
            )}
          </div>
        );
      })}
    </div>
  );
}

// ── App ────────────────────────────────────────────────────
function App() {
  const [tab, setTab] = useState('dashboard');
  const [products, setProducts] = useState([]);
  const [orders, setOrders] = useState([]);
  const [customers, setCustomers] = useState([]);
  const [stats, setStats] = useState({});
  const { toasts, show: toast, dismiss } = useToast();
  const { confirm, modal } = useConfirm();

  const fetchAll = useCallback(async () => {
    try {
      const [p, o, c, s] = await Promise.all([
        fetch('/api/products').then(r => r.json()),
        fetch('/api/orders').then(r => r.json()),
        fetch('/api/customers').then(r => r.json()),
        fetch('/api/stats').then(r => r.json()),
      ]);
      setProducts(Array.isArray(p) ? p : []);
      setOrders(Array.isArray(o) ? o : []);
      setCustomers(Array.isArray(c) ? c : []);
      setStats(s && !s.error ? s : {});
    } catch {
      toast('Failed to load data — check connection', 'error');
    }
  }, []);

  useEffect(() => { fetchAll(); }, [fetchAll]);

  const tabs = [
    { id: 'dashboard',    label: 'Dashboard' },
    { id: 'products',     label: 'Products' },
    { id: 'create-order', label: 'Create Order' },
    { id: 'orders',       label: 'Orders' },
  ];

  return (
    <>
      <Toast toasts={toasts} dismiss={dismiss}/>
      {modal}
      <header className="app-header">
        <div className="header-logo">P. Ketwaroo &amp; Sons</div>
        <div className="header-sub">Inventory Management System</div>
      </header>
      <nav className="app-nav">
        <div className="nav-inner">
          {tabs.map(t => (
            <button key={t.id} className={`nav-tab ${tab === t.id ? 'nav-tab-active' : ''}`} onClick={() => setTab(t.id)}>
              {t.label}
            </button>
          ))}
        </div>
      </nav>
      <main className="app-main">
        {tab === 'dashboard'    && <DashboardTab stats={stats} orders={orders} onTabChange={setTab}/>}
        {tab === 'products'     && <ProductsTab products={products} onRefresh={fetchAll} toast={toast} confirm={confirm}/>}
        {tab === 'create-order' && <CreateOrderTab products={products} customers={customers} onOrderCreated={fetchAll} toast={toast}/>}
        {tab === 'orders'       && <OrdersTab orders={orders} onRefresh={fetchAll} toast={toast} confirm={confirm}/>}
      </main>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
