<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>P. Ketwaroo Inventory System</title>
<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.2/dist/jspdf.umd.min.js" defer></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0b0d18;color:#c8cde8;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;font-size:14px}
button{cursor:pointer;border:none;font-family:inherit;font-size:14px;transition:opacity .15s}
button:hover{opacity:.85}
input,select,textarea{font-family:inherit;font-size:14px}

/* layout */
.header{background:#0f1222;border-bottom:1px solid #252840;padding:14px 24px}
.header-logo{font-size:19px;font-weight:700;color:#fff}
.header-sub{font-size:11px;color:#8b96b8;margin-top:2px}
.nav{background:#0f1222;border-bottom:1px solid #252840;padding:10px 24px;display:flex;gap:6px;align-items:center}
.nav-btn{background:none;color:#8b96b8;padding:8px 16px;border-radius:999px;font-weight:500;display:inline-flex;align-items:center;gap:6px;transition:background .15s,color .15s}
.nav-btn:hover{color:#c8cde8;opacity:1;background:#1a1e35}
.nav-btn.active{color:#fff;background:#f0a820}
.nav-btn.active:hover{background:#f0a820;opacity:.92}
.main{padding:24px;max-width:1100px;margin:0 auto}

/* card */
.card{background:#13162a;border:1px solid #252840;border-radius:14px;padding:22px;margin-bottom:20px}

/* stats */
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:14px;margin-bottom:24px}
.stat{background:#13162a;border:1px solid #252840;border-radius:14px;padding:18px 20px;display:flex;flex-direction:column;gap:10px;min-height:118px}
.stat-top{display:flex;align-items:center;gap:8px;color:#8b96b8;font-size:12px;font-weight:500;text-transform:uppercase;letter-spacing:.4px}
.stat-icon{width:30px;height:30px;border-radius:8px;display:inline-flex;align-items:center;justify-content:center;font-size:15px;background:#1a1e35;flex-shrink:0}
.stat-lbl{font-size:12px;color:#8b96b8;font-weight:500;text-transform:uppercase;letter-spacing:.4px}
.stat-val{font-size:32px;font-weight:700;color:#fff;line-height:1;letter-spacing:-.5px}
.stat.blue  .stat-icon{background:#1a2a4a;color:#5b8ff0}
.stat.green .stat-icon{background:#0e2a1e;color:#2dc875}
.stat.amber .stat-icon{background:#3a2e10;color:#f0a820}
.stat.red   .stat-icon{background:#2e1010;color:#e05252}
.stat.hero{background:linear-gradient(135deg,#0e2a1e 0%,#13162a 70%);border-color:#1e4a32}
.stat.hero .stat-icon{background:rgba(45,200,117,.15);color:#2dc875}
.stat.hero-amber{background:linear-gradient(135deg,#3a2e10 0%,#13162a 70%);border-color:#5a4612}
.stat.hero-amber .stat-icon{background:rgba(240,168,32,.15);color:#f0a820}

/* bold-flat tile variants (theme experiment) */
.stat.bold{padding:24px;border-radius:24px;border:none;color:#fff;min-height:140px}
.stat.bold .stat-top{color:rgba(255,255,255,.78);font-size:11px;letter-spacing:.6px}
.stat.bold .stat-icon{background:rgba(255,255,255,.18);color:#fff}
.stat.bold .stat-val{font-size:38px;color:#fff;letter-spacing:-1px;font-family:'Space Grotesk',-apple-system,sans-serif}
.stat.bold .delta{background:rgba(255,255,255,.22);color:#fff}
.stat.bold-coral{background:#f06352}
.stat.bold-lavender{background:#7e6cef}
.stat.bold-yellow{background:#f4c93f}
.stat.bold-yellow,.stat.bold-yellow .stat-val{color:#1a1a2e}
.stat.bold-yellow .stat-top{color:rgba(26,26,46,.65)}
.stat.bold-yellow .stat-icon{background:rgba(26,26,46,.14);color:#1a1a2e}
.stat.bold-yellow .delta{background:rgba(26,26,46,.14);color:#1a1a2e}
.stat.bold-mint{background:#4eae65}

.title-display{font-family:'Space Grotesk',-apple-system,sans-serif;font-size:42px;font-weight:700;color:#fff;letter-spacing:-1.5px;text-transform:uppercase;margin-bottom:20px;line-height:1}
@media(max-width:640px){
  .title-display{font-size:30px;margin-bottom:14px;letter-spacing:-1px}
  .stat.bold{padding:18px;border-radius:20px;min-height:120px}
  .stat.bold .stat-val{font-size:28px}
}
.delta{display:inline-flex;align-items:center;gap:3px;padding:3px 9px;border-radius:999px;font-size:11px;font-weight:600;width:fit-content}
.delta.up{background:rgba(45,200,117,.14);color:#2dc875}
.delta.down{background:rgba(224,82,82,.14);color:#e05252}
.delta.flat{background:#1a1e35;color:#8b96b8}

/* form */
.form-row{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:12px}
.fg{display:flex;flex-direction:column;gap:5px;flex:1;min-width:110px}
.fg label{font-size:11px;color:#8b96b8;font-weight:500;text-transform:uppercase;letter-spacing:.4px}
.input{background:#0b0d18;border:1px solid #252840;border-radius:8px;padding:9px 12px;color:#c8cde8;outline:none;width:100%}
.input:focus{border-color:#5b8ff0}

/* buttons */
.btn{padding:9px 18px;border-radius:8px;font-weight:500}
.btn.primary{background:#5b8ff0;color:#fff}
.btn.success{background:#2dc875;color:#fff}
.btn.danger{background:#e05252;color:#fff}
.btn.ghost{background:#252840;color:#c8cde8}
.btn.sm{padding:5px 10px;font-size:12px}
.btn.xs{padding:3px 8px;font-size:11px}
.btn-row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}

/* table */
table{width:100%;border-collapse:collapse}
th{text-align:left;font-size:11px;color:#8b96b8;font-weight:500;padding:8px 12px;border-bottom:1px solid #252840;text-transform:uppercase;letter-spacing:.4px}
td{padding:10px 12px;border-bottom:1px solid #1a1e35;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr.lowstock td{background:#160e0e}

/* badges */
.badge{display:inline-block;padding:3px 8px;border-radius:4px;font-size:11px;font-weight:600}
.badge.pending{background:#3a2e10;color:#f0a820}
.badge.loaded{background:#0e2e1e;color:#2dc875}
.badge.out{background:#2e1010;color:#e05252}
.badge.critical{background:#2e1010;color:#e05252}
.badge.low{background:#3a2e10;color:#f0a820}
.badge.paid{background:#0e2e1e;color:#2dc875}
.badge.partial{background:#3a2e10;color:#f0a820}
.badge.unpaid{background:#2e1010;color:#e05252}
.badge.pickup{background:#1e2d4a;color:#5b8ff0}
.badge.delivered{background:#0e2e1e;color:#2dc875}
.badge.undelivered{background:#3a2e10;color:#f0a820}
.badge.click{cursor:pointer;user-select:none}
.badge.click:hover{filter:brightness(1.25)}

.pay-opts{display:flex;flex-direction:column;gap:6px;margin-top:4px}
.pay-opt{display:flex;align-items:center;gap:8px;padding:8px 10px;border:1px solid #252840;border-radius:6px;cursor:pointer;font-size:13px}
.pay-opt:hover{border-color:#3a3f5e}
.pay-opt.active{border-color:#5b8ff0;background:#1a2138}
.pay-opt input[type=radio]{margin:0}
.pay-opt input[type=number]{margin-left:auto;width:110px}
.taken-wrap{display:flex;align-items:center;gap:4px;color:#8b96b8;font-size:11px}
.taken-wrap input{width:44px;padding:4px 6px;text-align:center;color:#fff;font-weight:600;font-size:13px}

/* pills */
.pills{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.pill{padding:5px 14px;border-radius:20px;font-size:12px;font-weight:500;background:#1a1e35;color:#8b96b8;cursor:pointer;border:1px solid transparent;user-select:none}
.pill:hover{color:#c8cde8}
.pill.active{background:#1e2d4a;color:#5b8ff0;border-color:#5b8ff0}

/* search */
.search-wrap{position:relative;margin-bottom:14px}
.search-wrap .input{padding-left:34px}
.search-ico{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:#8b96b8;pointer-events:none}

/* autocomplete */
.ac-wrap{position:relative}
.ac-drop{position:absolute;top:calc(100% + 2px);left:0;right:0;background:#1a1e35;border:1px solid #252840;border-radius:6px;z-index:50;max-height:160px;overflow-y:auto;display:none}
.ac-drop.open{display:block}
.ac-item{padding:9px 12px;cursor:pointer}
.ac-item:hover{background:#252840}

/* order card */
.ord-card{background:#0f1222;border:1px solid #252840;border-radius:12px;margin-bottom:10px;overflow:hidden}
.ord-card.to-deliver{border-left:3px solid #f0a820}
.cu-card{background:#0f1222;border:1px solid #252840;border-radius:12px;margin-bottom:10px;overflow:hidden}
.cu-card.owes{border-left:3px solid #e05252}
.cu-meta{padding:10px 12px;background:#0b0d18;border-radius:6px;font-size:13px;margin-bottom:14px}
.cu-meta .muted{color:#8b96b8}
.cu-edit{background:#0b0d18;border-radius:6px;padding:12px;margin-bottom:14px}
.cu-edit textarea.input{resize:vertical;min-height:48px}
.cu-section-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:14px}
@media(max-width:640px){.cu-section-grid{grid-template-columns:1fr}}
.cu-section-hdr{font-size:12px;text-transform:uppercase;letter-spacing:.5px;color:#8b96b8;margin-bottom:6px;font-weight:600}
.cu-row{display:flex;align-items:center;gap:10px;padding:8px 10px;background:#0b0d18;border-radius:6px;margin-bottom:6px}
.cu-paybox{background:#0b0d18;border:1px solid #252840;border-radius:6px;padding:12px;margin-bottom:12px}
.muted{color:#8b96b8;font-size:13px}
.ord-hdr{display:flex;justify-content:space-between;align-items:center;padding:14px 16px;cursor:pointer}
.ord-hdr:hover{background:#13162a}
.ord-meta{font-size:12px;color:#8b96b8;margin-top:3px}
.ord-body{padding:0 16px 14px;display:none}
.ord-body.open{display:block}

/* checklist */
.chk-item{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid #1a1e35}
.chk-item:last-child{border-bottom:none}
.chk-item input[type=checkbox]{width:16px;height:16px;accent-color:#2dc875;cursor:pointer;flex-shrink:0}
.chk-item.done .iname{text-decoration:line-through;color:#8b96b8}

/* order items */
.oi-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid #1a1e35;flex-wrap:wrap}
.oi-row:last-child{border-bottom:none}
.oi-name{flex:1;min-width:0;font-weight:500}
.qty-btn{width:28px;height:28px;border-radius:4px;background:#252840;color:#c8cde8;font-size:18px;line-height:1;display:inline-flex;align-items:center;justify-content:center}
.qty-btn:hover{background:#5b8ff0;color:#fff;opacity:1}
.total-bar{background:#0b0d18;border-radius:6px;padding:14px 16px;margin-top:12px;display:flex;justify-content:space-between;align-items:center}
.total-lbl{color:#8b96b8;font-size:13px}
.total-val{font-size:20px;font-weight:700;color:#fff}

/* toast */
#toasts{position:fixed;top:20px;right:20px;z-index:999;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast{padding:12px 18px;border-radius:8px;font-size:14px;font-weight:500;min-width:200px;max-width:320px;pointer-events:all;cursor:pointer;animation:tin .2s ease}
.toast.success{background:#0e2e1e;color:#2dc875;border:1px solid #2dc875}
.toast.error{background:#2e1010;color:#e05252;border:1px solid #e05252}
.toast.info{background:#1e2d4a;color:#5b8ff0;border:1px solid #5b8ff0}
@keyframes tin{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}

/* modal */
#modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:900;display:none;align-items:center;justify-content:center}
#modal-bg.open{display:flex}
#modal-box{background:#13162a;border:1px solid #252840;border-radius:10px;padding:24px;min-width:300px;max-width:420px}
#modal-msg{margin-bottom:20px;line-height:1.6;color:#c8cde8}
#modal-actions{display:flex;gap:10px;justify-content:flex-end}

.sec-title{font-size:16px;font-weight:600;color:#fff;margin-bottom:14px}
.sec-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.empty{color:#8b96b8;padding:16px 0}
.rec-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid #1a1e35}
.rec-row:last-child{border-bottom:none}

.report-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:16px;margin-bottom:20px}
.rep-row{display:flex;align-items:center;gap:12px;padding:8px 0;border-bottom:1px solid #1a1e35}
.rep-row:last-child{border-bottom:none}
.rep-name{flex:1;font-weight:500;color:#e8eaf5;font-size:14px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0}
.rep-meta{font-size:12px;color:#8b96b8;white-space:nowrap}
.rep-val{font-weight:600;color:#fff;font-size:14px;min-width:60px;text-align:right;white-space:nowrap}
.delta-up{color:#2dc875;font-size:11px;font-weight:600;margin-left:6px}
.delta-down{color:#e05252;font-size:11px;font-weight:600;margin-left:6px}
.delta-flat{color:#8b96b8;font-size:11px;margin-left:6px}

.trend-chart{display:flex;gap:6px;align-items:flex-end;height:180px;padding-top:8px;overflow-x:auto}
.trend-col{flex:1 0 36px;min-width:36px;display:flex;flex-direction:column;align-items:center;gap:4px;height:100%}
.trend-bar-wrap{width:100%;flex:1;display:flex;align-items:flex-end;min-height:0}
.trend-bar{width:100%;background:linear-gradient(180deg,#5b8ff0,#3d6dc7);border-radius:3px 3px 0 0;min-height:2px;transition:height .3s}
.trend-label{font-size:10px;color:#8b96b8;white-space:nowrap}
.trend-val{font-size:10px;color:#c8cde8;font-weight:600;height:14px}
input[type=number]::-webkit-inner-spin-button,
input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;margin:0}
input[type=number]{-moz-appearance:textfield}

@media(max-width:640px){
  .header{padding:12px 16px}
  .header-logo{font-size:16px}
  .main{padding:14px 10px}
  .card{padding:14px}
  .nav{overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
  .nav::-webkit-scrollbar{display:none}
  .nav-btn{padding:10px 13px;font-size:13px;white-space:nowrap}
  .stats{grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:16px}
  .stat{padding:14px;min-height:96px;gap:8px}
  .stat-val{font-size:24px}
  .stat-icon{width:26px;height:26px;font-size:13px}
  .stat-top,.stat-lbl{font-size:11px}
  .fg{min-width:0}
  .form-row{gap:8px}
  .oi-name{width:100%;flex:none;margin-bottom:2px}
  .oi-row{gap:8px;padding:10px 0}
  .total-bar{flex-direction:column;align-items:flex-start;gap:6px}
  .total-val{font-size:17px}
  .ord-hdr{padding:12px}
  .chk-item{gap:8px}
  table{display:block;overflow-x:auto;-webkit-overflow-scrolling:touch}
  #modal-box{min-width:unset;width:92vw}
  .sec-title{font-size:14px}
  .btn{font-size:13px}
  .trend-chart{height:140px;gap:4px}
  .trend-col{min-width:28px}
  .trend-label,.trend-val{font-size:9px}
  .rep-meta{font-size:11px}
  .rep-name{font-size:13px}
}
</style>
</head>
<body>

<div id="toasts"></div>

<div id="modal-bg">
  <div id="modal-box">
    <p id="modal-msg"></p>
    <div id="modal-actions">
      <button class="btn danger" id="modal-yes">Delete</button>
      <button class="btn ghost"  id="modal-no">Cancel</button>
    </div>
  </div>
</div>

<div class="header">
  <div class="header-logo">P. Ketwaroo &amp; Sons</div>
  <div class="header-sub">Inventory Management System</div>
</div>

<nav class="nav" id="nav"></nav>

<div class="main" id="main"></div>

<script>
// ═══════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════
const S = {
  tab: 'dashboard',
  products: [], orders: [], customers: [], stats: {},
  // products tab
  p_search: '', p_cat: 'All', p_editId: null,
  p_form: {name:'',category:'',price:'',stock:''},
  // orders tab
  o_search: '', o_filter: 'all', o_expanded: null,
  o_editing: null, o_edit_items: [], o_edit_prod: '', o_edit_prod_open: false,
  o_edit_name: '', o_edit_name_open: false,
  o_edit_pay_mode: 'unpaid', o_edit_pay_custom: '',
  // reports tab
  r_period: 'week',
  // create order tab
  c_cust: '', c_prod: '', c_items: [],
  c_cust_open: false, c_prod_open: false,
  c_pay_mode: 'unpaid', c_pay_custom: '',
  // customers tab
  customers_full: [],
  cu_search: '', cu_expanded: null, cu_detail: null, cu_loading: false,
  cu_pay_amount: '', cu_pay_note: '',
  cu_editing: false, cu_edit_name: '', cu_edit_phone: '', cu_edit_notes: '',
};

let _restoringFocus = false;
const fmt = n => parseFloat(n||0).toFixed(2);
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function parseItems(v){ if(Array.isArray(v))return v; try{return JSON.parse(v);}catch(e){return[];} }

// ═══════════════════════════════════════════════════════════
// SHARE ORDER (WhatsApp + PDF)
// ═══════════════════════════════════════════════════════════
function formatOrderText(order){
  const items = parseItems(order.items);
  const date = new Date(order.created_at).toLocaleDateString();
  const total = parseFloat(order.total)||0;
  const paid = parseFloat(order.amount_paid)||0;
  const owed = Math.max(0, total - paid);
  const payLine = paid <= 0 ? `Payment: Unpaid — pay on delivery ($${fmt(total)})`
    : paid >= total ? `Payment: Paid in full ($${fmt(total)})`
    : `Payment: $${fmt(paid)} paid · $${fmt(owed)} owed`;
  const lines = [
    `*P. Ketwaroo & Sons*`,
    `Order #${order.id} — ${date}`,
    `Customer: ${order.customer_name}`,
    ``,
    ...items.map(i => {
      const q = parseInt(i.quantity)||0, t = parseInt(i.taken)||0;
      const tail = t>0 ? (t>=q ? '  (all picked up)' : `  (${t} picked up · ${q-t} to deliver)`) : '';
      return `• ${q}× ${i.name} @ $${fmt(i.price)} = $${fmt(i.price*q)}${tail}`;
    }),
    ``,
    `*Total: $${fmt(total)}*`,
    payLine,
    `Status: ${(order.status||'pending')==='loaded'?'Loaded':'Pending'}`
  ];
  return lines.join('\n');
}

function buildOrderPDF(order){
  if(!window.jspdf || !window.jspdf.jsPDF) return null;
  const { jsPDF } = window.jspdf;
  const W = 420, H = 720;
  const doc = new jsPDF({ unit:'pt', format:[W, H] });
  const items = parseItems(order.items);
  const date = new Date(order.created_at).toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' });
  const M = 30, RIGHT = W - M;

  // Soft paper background
  doc.setFillColor(252,252,248);
  doc.rect(10, 10, W-20, H-20, 'F');
  doc.setDrawColor(230,228,220); doc.setLineWidth(1);
  doc.rect(10, 10, W-20, H-20, 'S');

  // Header
  let y = 48;
  doc.setFont('helvetica','bold'); doc.setFontSize(20);
  doc.setTextColor(26,26,26);
  doc.text('P. Ketwaroo & Sons', W/2, y, { align:'center' });

  y += 30;
  doc.setFont('helvetica','normal'); doc.setFontSize(12);
  doc.setTextColor(107,107,107);
  doc.text(`Order #${order.id} — ${date}`, M, y);

  y += 28;
  doc.setFontSize(13);
  doc.setTextColor(107,107,107);
  const forLabel = 'For: ';
  doc.text(forLabel, M, y);
  doc.setFont('helvetica','bold'); doc.setTextColor(26,26,26);
  doc.text(String(order.customer_name||''), M + doc.getTextWidth(forLabel), y);

  // Soft divider
  y += 18;
  doc.setDrawColor(224,221,209); doc.setLineWidth(1);
  doc.line(M, y, RIGHT, y);

  // Items
  y += 28;
  let totalToDeliver = 0;
  for(const it of items){
    if(y > H - 200){ doc.addPage(); y = 48; }
    const q = parseInt(it.quantity)||0;
    const t = parseInt(it.taken)||0;
    const lineTotal = (parseFloat(it.price)||0) * q;

    // Qty (right-aligned bold) | Name | Total (right-aligned bold)
    doc.setFont('helvetica','bold'); doc.setFontSize(13);
    doc.setTextColor(26,26,26);
    doc.text(String(q), M + 28, y, { align:'right' });
    doc.setFont('helvetica','normal');
    doc.text(String(it.name||'').slice(0, 38), M + 44, y);
    doc.setFont('helvetica','bold');
    doc.text('$'+fmt(lineTotal), RIGHT, y, { align:'right' });

    // Status sub-line
    y += 14;
    doc.setFont('helvetica','normal'); doc.setFontSize(10);
    if(q > 0 && t >= q){
      doc.setTextColor(58,138,79); // green
      doc.text('all picked up', M + 44, y);
    } else if(t > 0){
      doc.setTextColor(160,107,28); // amber
      doc.text(`${t} picked up  ·  ${q-t} to deliver`, M + 44, y);
      totalToDeliver += (q-t);
    } else {
      doc.setTextColor(160,107,28);
      doc.text('to deliver', M + 44, y);
      totalToDeliver += q;
    }
    y += 22;
  }

  // Divider
  y += 4;
  doc.setDrawColor(187,182,164); doc.setLineWidth(1);
  doc.line(M, y, RIGHT, y);

  // Total
  y += 26;
  const totalNum = parseFloat(order.total)||0;
  doc.setFont('helvetica','normal'); doc.setFontSize(15);
  doc.setTextColor(26,26,26);
  doc.text('Total', M, y);
  doc.setFont('helvetica','bold'); doc.setFontSize(20);
  doc.text('$'+fmt(totalNum), RIGHT, y, { align:'right' });

  y += 14;
  doc.setDrawColor(187,182,164); doc.setLineWidth(1);
  doc.line(M, y, RIGHT, y);

  // Payment
  y += 26;
  const paidNum = parseFloat(order.amount_paid)||0;
  doc.setFont('helvetica','normal'); doc.setFontSize(11);
  doc.setTextColor(107,107,107);
  doc.text('Payment', M, y);

  y += 20;
  doc.setFontSize(13);
  if(paidNum <= 0){
    doc.setFont('helvetica','bold'); doc.setTextColor(176,58,58);
    doc.text(`Unpaid — $${fmt(totalNum)} balance`, M, y);
  } else if(paidNum >= totalNum){
    doc.setFont('helvetica','bold'); doc.setTextColor(58,138,79);
    doc.text(`Paid in full — $${fmt(totalNum)}`, M, y);
  } else {
    doc.setFont('helvetica','bold'); doc.setTextColor(26,26,26);
    const part1 = `$${fmt(paidNum)} paid`;
    doc.text(part1, M, y);
    const w1 = doc.getTextWidth(part1);
    doc.setFont('helvetica','normal'); doc.setTextColor(107,107,107);
    const sep = '  ·  ';
    doc.text(sep, M + w1, y);
    const w2 = doc.getTextWidth(sep);
    doc.setFont('helvetica','bold'); doc.setTextColor(176,58,58);
    doc.text(`$${fmt(totalNum-paidNum)} balance`, M + w1 + w2, y);
  }

  // Delivery
  y += 32;
  doc.setFont('helvetica','normal'); doc.setFontSize(11);
  doc.setTextColor(107,107,107);
  doc.text('Delivery', M, y);
  y += 20;
  doc.setFont('helvetica','bold'); doc.setFontSize(13);
  if(totalToDeliver > 0){
    doc.setTextColor(160,107,28);
    doc.text(`${totalToDeliver} item${totalToDeliver===1?'':'s'} to deliver`, M, y);
  } else {
    doc.setTextColor(58,138,79);
    doc.text('All picked up', M, y);
  }

  // Footer
  doc.setFont('helvetica','normal'); doc.setFontSize(10);
  doc.setTextColor(160,160,160);
  doc.text('— P. Ketwaroo & Sons —', W/2, H - 42, { align:'center' });

  return doc.output('blob');
}

async function shareWhatsApp(order){
  const pdfBlob = buildOrderPDF(order);
  if(!pdfBlob){
    toast('PDF still loading — try again in a sec','error');
    return;
  }

  const fname = `order-${order.id}-${(order.customer_name||'').replace(/[^a-z0-9]+/gi,'-').toLowerCase()}.pdf`;
  const file = new File([pdfBlob], fname, { type:'application/pdf' });

  if(navigator.canShare && navigator.canShare({ files: [file] })){
    try {
      await navigator.share({ files: [file], title: `Order #${order.id}` });
      return;
    } catch(err){
      if(err && err.name === 'AbortError') return;
    }
  }

  // Desktop / unsupported: download PDF and let user attach manually
  const url = URL.createObjectURL(pdfBlob);
  const a = document.createElement('a');
  a.href = url; a.download = fname;
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(url), 1000);
  toast('PDF saved — open WhatsApp and attach it','info');
}

// TOAST

function toast(msg, type){
  type = type||'info';
  const el = document.createElement('div');
  el.className = 'toast '+type;
  el.textContent = msg;
  el.onclick = () => el.remove();
  document.getElementById('toasts').appendChild(el);
  setTimeout(()=>el.remove(), 3000);
}

// ═══════════════════════════════════════════════════════════
// CONFIRM MODAL
// ═══════════════════════════════════════════════════════════
function confirm(msg){
  return new Promise(resolve => {
    document.getElementById('modal-msg').textContent = msg;
    document.getElementById('modal-bg').classList.add('open');
    const yes = document.getElementById('modal-yes');
    const no  = document.getElementById('modal-no');
    function cleanup(result){ document.getElementById('modal-bg').classList.remove('open'); yes.onclick=null; no.onclick=null; resolve(result); }
    yes.onclick = ()=>cleanup(true);
    no.onclick  = ()=>cleanup(false);
  });
}

async function api(url, opts){
  const res = await fetch(url, opts);
  const data = await res.json();
  if(!res.ok) throw new Error(data.error||'Request failed');
  return data;
}

async function fetchAll(){
  try {
    const [p,o,cf,s] = await Promise.all([
      fetch('/api/products').then(r=>r.json()),
      fetch('/api/orders').then(r=>r.json()),
      fetch('/api/customers/full').then(r=>r.json()),
      fetch('/api/stats').then(r=>r.json()),
    ]);
    S.products       = Array.isArray(p)?p:[];
    S.orders         = Array.isArray(o)?o:[];
    S.customers_full = Array.isArray(cf)?cf:[];
    S.customers      = S.customers_full.map(c=>c.name).sort();
    S.stats          = (s&&!s.error)?s:{};
    render();
  } catch(e){ toast('Failed to load data','error'); }
}

async function loadCustomerDetail(name){

    S.cu_loading = false; render();

// ═══════════════════════════════════════════════════════════
function statusBadge(status){
  return `<span class="badge ${status==='loaded'?'loaded':'pending'}">${status==='loaded'?'Loaded':'Pending'}</span>`;
}
function paymentBadge(paid, total, orderId){
  paid = parseFloat(paid)||0; total = parseFloat(total)||0;
  const cls = orderId ? ' click' : '';
  const attrs = orderId ? ` data-action="toggle-paid" data-id="${orderId}" title="Click to mark paid/unpaid"` : '';
  if(total > 0 && paid >= total) return `<span class="badge paid${cls}"${attrs}>Paid</span>`;
  if(paid > 0) return `<span class="badge partial${cls}"${attrs}>Partial $${fmt(paid)}/$${fmt(total)}</span>`;
  return `<span class="badge unpaid${cls}"${attrs}>Unpaid</span>`;
}
function deliveryBadge(items){
  let totQ=0, totT=0;
  for(const i of items){ totQ += parseInt(i.quantity)||0; totT += parseInt(i.taken)||0; }
  if(totT === 0 || totQ === 0) return '';
  if(totT >= totQ) return '<span class="badge pickup">All picked up</span>';
  return `<span class="badge pickup">${totQ-totT} to deliver</span>`;
}
function deliveredBadge(deliveredAt, orderId){
  const isDelivered = !!deliveredAt;
  const cls = orderId ? ' click' : '';
  const attrs = orderId ? ` data-action="toggle-delivered" data-id="${orderId}" title="Click to toggle delivered"` : '';
  if(isDelivered){
    const date = new Date(deliveredAt).toLocaleDateString();
    return `<span class="badge delivered${cls}"${attrs}>✓ Delivered ${date}</span>`;
  }
  return `<span class="badge undelivered${cls}"${attrs}>🚚 Not Delivered</span>`;
}
function payOptionsHTML(idPrefix, mode, customVal, total){
  return `
    <div class="pay-opts">
      <label class="pay-opt${mode==='unpaid'?' active':''}">
        <input type="radio" name="${idPrefix}-pay" value="unpaid" ${mode==='unpaid'?'checked':''}/>
        <span>Pay on delivery</span>
      </label>
      <label class="pay-opt${mode==='full'?' active':''}">
        <input type="radio" name="${idPrefix}-pay" value="full" ${mode==='full'?'checked':''}/>
        <span>Paid in full <span style="color:#8b96b8">($${fmt(total)})</span></span>
      </label>
      <label class="pay-opt${mode==='custom'?' active':''}">
        <input type="radio" name="${idPrefix}-pay" value="custom" ${mode==='custom'?'checked':''}/>
        <span>Custom amount</span>
        <input class="input" id="${idPrefix}-pay-custom" type="number" step="0.01" min="0" value="${esc(customVal)}" placeholder="0.00" ${mode!=='custom'?'disabled':''}/>
      </label>
    </div>`;
}
function stockBadge(n){
  if(n===0) return `<span class="badge out">Out</span>`;
  if(n<5)   return `<span class="badge critical">${n}</span>`;
  if(n<10)  return `<span class="badge low">${n}</span>`;
  return n;
}
function deltaChip(curr, prev){
  curr = parseFloat(curr)||0; prev = parseFloat(prev)||0;
  if(prev <= 0){
    if(curr > 0) return `<span class="delta up">↗ New</span>`;
    return '';
  }
  const pct = ((curr - prev) / prev) * 100;
  if(Math.abs(pct) < 0.5) return `<span class="delta flat">↔ 0%</span>`;
  const cls = pct > 0 ? 'up' : 'down';
  const arrow = pct > 0 ? '↗' : '↘';
  return `<span class="delta ${cls}">${arrow} ${pct>0?'+':''}${pct.toFixed(0)}% vs yesterday</span>`;
}
function statCard({variant, icon, label, value, delta}){
  return `
    <div class="stat ${variant||''}">
      <div class="stat-top">
        <div class="stat-icon">${icon}</div>
        <span>${label}</span>
      </div>
      <div class="stat-val">${value}</div>
      ${delta || '<span class="delta flat" style="visibility:hidden">·</span>'}
    </div>`;
}

// REPORTS
// ═══════════════════════════════════════════════════════════
function periodRange(period){
  const now = new Date();
  if(period==='today'){
    const start = new Date(now.getFullYear(), now.getMonth(), now.getDate());
    const prevStart = new Date(start); prevStart.setDate(prevStart.getDate()-1);
    return {start, end:now, prevStart, prevEnd:start};
  }
  if(period==='week'){
    const start = new Date(now.getTime() - 7*24*60*60*1000);
    return {start, end:now, prevStart:new Date(now.getTime() - 14*24*60*60*1000), prevEnd:start};
  }
  if(period==='month'){
    const start = new Date(now.getTime() - 30*24*60*60*1000);
    return {start, end:now, prevStart:new Date(now.getTime() - 60*24*60*60*1000), prevEnd:start};
  }
  return null;
}

function aggOrders(orders){
  const revenue = orders.reduce((s,o)=>s+parseFloat(o.total||0),0);
  const count = orders.length;
  return {revenue, count, avg: count?revenue/count:0};
}

function buildBuckets(period, orders){
  if(period==='today') return null;
  const idx = {}, list = [];
  if(period==='week' || period==='month'){
    const days = period==='week'?7:30;
    for(let i=days-1; i>=0; i--){
      const d = new Date(); d.setHours(0,0,0,0); d.setDate(d.getDate()-i);
      const key = d.toISOString().slice(0,10);
      const b = {key, label:d.toLocaleDateString('en-US',{month:'short',day:'numeric'}), revenue:0};
      list.push(b); idx[key]=b;
    }
    for(const o of orders){
      const k = new Date(o.created_at).toISOString().slice(0,10);
      if(idx[k]) idx[k].revenue += parseFloat(o.total||0);
    }
  } else {
    for(const o of orders){
      const d = new Date(o.created_at);
      const key = d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');
      if(!idx[key]){
        idx[key] = {key, label:d.toLocaleDateString('en-US',{month:'short',year:'2-digit'}), revenue:0};
        list.push(idx[key]);
      }
      idx[key].revenue += parseFloat(o.total||0);
    }
    list.sort((a,b)=>a.key.localeCompare(b.key));
  }
  return list;
}

function computeReports(){
  const r = periodRange(S.r_period);
  const filtered = S.orders.filter(o=>{
    if(!r) return true;
    const d = new Date(o.created_at);
    return d >= r.start && d <= r.end;
  });
  const prevOrders = r ? S.orders.filter(o=>{
    const d = new Date(o.created_at);
    return d >= r.prevStart && d < r.prevEnd;
  }) : null;

  const cur = aggOrders(filtered);
  const prev = prevOrders ? aggOrders(prevOrders) : null;

  // top customers
  const custMap = {};
  for(const o of filtered){
    const n = o.customer_name || '—';
    if(!custMap[n]) custMap[n] = {name:n, revenue:0, orders:0};
    custMap[n].revenue += parseFloat(o.total||0);
    custMap[n].orders += 1;
  }
  const topCustomers = Object.values(custMap).sort((a,b)=>b.revenue-a.revenue).slice(0,10);

  // top products
  const prodMap = {};
  for(const o of filtered){
    for(const it of parseItems(o.items)){
      if(!prodMap[it.name]) prodMap[it.name] = {name:it.name, units:0, revenue:0};
      prodMap[it.name].units += parseInt(it.quantity)||0;
      prodMap[it.name].revenue += (parseFloat(it.price)||0)*(parseInt(it.quantity)||0);
    }
  }
  const topByRev = Object.values(prodMap).sort((a,b)=>b.revenue-a.revenue).slice(0,8);
  const topByUnits = Object.values(prodMap).sort((a,b)=>b.units-a.units).slice(0,8);

  // reorder watch
  const reorder = S.products
    .filter(p => p.stock <= 10 && (prodMap[p.name]?.units||0) > 0)
    .map(p => ({...p, soldUnits: prodMap[p.name]?.units||0}))
    .sort((a,b)=>b.soldUnits-a.soldUnits)
    .slice(0,10);

  const buckets = buildBuckets(S.r_period, filtered);
  return {cur, prev, topCustomers, topByRev, topByUnits, reorder, buckets};
}

function deltaPill(curr, prev){
  if(prev===null||prev===undefined) return '';
  if(prev===0){
    if(curr===0) return '<span class="delta-flat">no prior</span>';
    return '<span class="delta-up">▲ new</span>';
  }
  const pct = ((curr-prev)/prev)*100;
  const pos = pct>=0;
  const cls = Math.abs(pct)<1 ? 'delta-flat' : (pos?'delta-up':'delta-down');
  const arrow = Math.abs(pct)<1 ? '·' : (pos?'▲':'▼');
  return `<span class="${cls}">${arrow} ${Math.abs(pct).toFixed(0)}%</span>`;
}

const shortMoney = n => {
  n = parseFloat(n)||0;
  if(n>=1000) return '$'+(n/1000).toFixed(1)+'k';
  return '$'+Math.round(n);
};

function reportsHTML(){
  const R = computeReports();
  const periods = [{id:'today',label:'Today'},{id:'week',label:'7 Days'},{id:'month',label:'30 Days'},{id:'all',label:'All Time'}];
  const maxBar = R.buckets ? Math.max(...R.buckets.map(b=>b.revenue), 1) : 1;
  const prevLabel = S.r_period==='today' ? 'yesterday' :
                    S.r_period==='week'  ? 'prev 7 days' :
                    S.r_period==='month' ? 'prev 30 days' : '';

  const dChip = (cur, prev) => {
    if(prev===null||prev===undefined||!R.prev) return '';
    return deltaChip(cur, prev);
  };
  const vs = prevLabel ? ` · vs ${prevLabel}` : '';

  return `
  <h1 class="title-display">Reports</h1>
  <div class="pills">
    ${periods.map(p=>`<div class="pill${S.r_period===p.id?' active':''}" data-r-period="${p.id}">${p.label}</div>`).join('')}
  </div>

  <div class="stats">
    ${statCard({variant:'bold bold-coral', icon:'💰', label:`Revenue${vs}`, value:`$${fmt(R.cur.revenue)}`, delta:dChip(R.cur.revenue, R.prev?.revenue)})}
    ${statCard({variant:'bold bold-lavender', icon:'📦', label:`Orders${vs}`, value:R.cur.count, delta:dChip(R.cur.count, R.prev?.count)})}
    ${statCard({variant:'bold bold-yellow', icon:'📊', label:`Avg Order${vs}`, value:`$${fmt(R.cur.avg)}`, delta:dChip(R.cur.avg, R.prev?.avg)})}
  </div>

  ${R.buckets && R.buckets.length>0 ? `
  <div class="card">
    <div class="sec-title">Revenue Trend</div>
    <div class="trend-chart">
      ${R.buckets.map(b=>`
        <div class="trend-col" title="${b.label}: $${fmt(b.revenue)}">
          <div class="trend-val">${b.revenue>0?shortMoney(b.revenue):''}</div>
          <div class="trend-bar-wrap">
            <div class="trend-bar" style="height:${b.revenue?Math.max(4,(b.revenue/maxBar)*100):0}%"></div>
          </div>
          <div class="trend-label">${b.label}</div>
        </div>
      `).join('')}
    </div>
  </div>` : ''}

  <div class="report-grid">
    <div class="card">
      <div class="sec-title">Top Customers</div>
      ${R.topCustomers.length===0 ? '<p class="empty">No orders in this period.</p>' :
        R.topCustomers.map(c=>`
        <div class="rep-row">
          <span class="rep-name">${esc(c.name)}</span>
          <span class="rep-meta">${c.orders} order${c.orders===1?'':'s'}</span>
          <span class="rep-val">$${fmt(c.revenue)}</span>
        </div>`).join('')}
    </div>

    <div class="card">
      <div class="sec-title">Top Products by Revenue</div>
      ${R.topByRev.length===0 ? '<p class="empty">No orders in this period.</p>' :
        R.topByRev.map(p=>`
        <div class="rep-row">
          <span class="rep-name">${esc(p.name)}</span>
          <span class="rep-meta">${p.units} units</span>
          <span class="rep-val">$${fmt(p.revenue)}</span>
        </div>`).join('')}
    </div>

    <div class="card">
      <div class="sec-title">Top Products by Units</div>
      ${R.topByUnits.length===0 ? '<p class="empty">No orders in this period.</p>' :
        R.topByUnits.map(p=>`
        <div class="rep-row">
          <span class="rep-name">${esc(p.name)}</span>
          <span class="rep-meta">$${fmt(p.revenue)}</span>
          <span class="rep-val">${p.units}</span>
        </div>`).join('')}
    </div>
  </div>

  <div class="card">
    <div class="sec-title">Reorder Watch <span style="font-size:12px;color:#8b96b8;font-weight:400">— stock ≤ 10 with recent sales</span></div>
    ${R.reorder.length===0 ? '<p class="empty">No items need reordering.</p>' :
      R.reorder.map(p=>`
      <div class="rep-row">
        <span class="rep-name">${esc(p.name)}</span>
        <span class="rep-meta">sold ${p.soldUnits} this period</span>
        <span class="rep-val" style="color:${p.stock<=3?'#e05252':'#f0a820'}">${p.stock} left</span>
      </div>`).join('')}
  </div>`;
}

// ═══════════════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════════════
const TABS = [
  {id:'dashboard',   label:'Dashboard'},
  {id:'products',    label:'Products'},
  {id:'create-order',label:'Create Order'},
  {id:'orders',      label:'Orders'},
  {id:'customers',   label:'Customers'},
  {id:'reports',     label:'Reports'},
];

function render(){
  const activeId = document.activeElement?.id;
  const selStart = document.activeElement?.selectionStart;
  const selEnd   = document.activeElement?.selectionEnd;

  // nav
  document.getElementById('nav').innerHTML = TABS.map(t=>
    `<button class="nav-btn${S.tab===t.id?' active':''}" data-tab="${t.id}">${t.label}</button>`
  ).join('');

  // content
  const main = document.getElementById('main');
  if(S.tab==='dashboard')         main.innerHTML = dashboardHTML();
  else if(S.tab==='products')     main.innerHTML = productsHTML();
  else if(S.tab==='create-order') main.innerHTML = createOrderHTML();
  else if(S.tab==='orders')       main.innerHTML = ordersHTML();
  else if(S.tab==='customers')    main.innerHTML = customersHTML();
  else if(S.tab==='reports')      main.innerHTML = reportsHTML();

  attachEvents();

  if(activeId){
    const el = document.getElementById(activeId);
    if(el){
      _restoringFocus = true;
      el.focus();
      try{ el.setSelectionRange(selStart, selEnd); }catch(_){}
      _restoringFocus = false;
    }
  }
}

// ═══════════════════════════════════════════════════════════
// EVENTS
// ═══════════════════════════════════════════════════════════
function attachEvents(){
  // tab nav
  document.querySelectorAll('[data-tab]').forEach(btn=>{
    btn.onclick = ()=>{ S.tab=btn.dataset.tab; render(); };
  });

  // search inputs (live)
  const ps = document.getElementById('p-search');
  if(ps) ps.oninput = e=>{ S.p_search=e.target.value; render(); };

  const os = document.getElementById('o-search');
  if(os) os.oninput = e=>{ S.o_search=e.target.value; render(); };

  // category pills
  document.querySelectorAll('[data-cat]').forEach(el=>{
    el.onclick = ()=>{ S.p_cat=el.dataset.cat; render(); };
  });

  // status filter pills
  document.querySelectorAll('[data-status-filter]').forEach(el=>{
    el.onclick = ()=>{ S.o_filter=el.dataset.statusFilter; render(); };
  });

  // product form inputs (track values so they survive re-render)
  ['p-name','p-cat-inp','p-price','p-stock'].forEach(id=>{
    const el = document.getElementById(id);
    if(!el) return;
    el.oninput = e=>{
      const key = {' p-name':'name','p-cat-inp':'category','p-price':'price','p-stock':'stock'}[id]||id.replace('p-','');
      const map = {'p-name':'name','p-cat-inp':'category','p-price':'price','p-stock':'stock'};
      S.p_form[map[id]] = e.target.value;
    };
  });

  // customer autocomplete
  const cc = document.getElementById('c-cust');
  if(cc){
    cc.oninput = e=>{ S.c_cust=e.target.value; S.c_cust_open=true; render(); };
    cc.onfocus = ()=>{ if(_restoringFocus) return; S.c_cust_open=true; render(); };
    cc.onblur  = ()=>setTimeout(()=>{ if(S.c_cust_open){ S.c_cust_open=false; render(); } },150);
  }

  // product search autocomplete
  const cp = document.getElementById('c-prod');
  if(cp){
    cp.oninput = e=>{ S.c_prod=e.target.value; S.c_prod_open=true; render(); };
    cp.onfocus = ()=>{ if(_restoringFocus) return; S.c_prod_open=true; render(); };
    cp.onblur  = ()=>setTimeout(()=>{ if(S.c_prod_open){ S.c_prod_open=false; render(); } },150);
  }

  // editable price + qty + taken inputs on order items
  S.c_items.forEach(item => {
    const pel = document.getElementById('c-price-'+item.id);
    if(pel) pel.onblur = e => {
      const val = parseFloat(e.target.value);
      if(!isNaN(val) && val >= 0){ item.price = val; render(); }
    };
    const qel = document.getElementById('c-qty-'+item.id);
    if(qel) qel.onblur = e => {
      const val = parseInt(e.target.value);
      if(!isNaN(val) && val > 0){ item.qty = val; if((item.taken||0)>val) item.taken=val; render(); }
      else if(!isNaN(val) && val <= 0){ S.c_items = S.c_items.filter(i=>i.id!==item.id); render(); }
    };
    const tel = document.getElementById('c-taken-'+item.id);
    if(tel) tel.onblur = e => {
      const val = parseInt(e.target.value);
      item.taken = isNaN(val) ? 0 : Math.max(0, Math.min(item.qty, val));
      render();
    };
  });

  // create-order payment radios + custom amount
  document.querySelectorAll('input[name="c-pay"]').forEach(r=>{
    r.onchange = e => { S.c_pay_mode = e.target.value; render(); };
  });
  const cpc = document.getElementById('c-pay-custom');
  if(cpc) cpc.onblur = e => {
    const v = parseFloat(e.target.value);
    S.c_pay_custom = (isNaN(v) || v < 0) ? '' : String(v);
  };

  // edit-order product search autocomplete
  const oep = document.getElementById('oe-prod');
  if(oep){
    oep.oninput = e=>{ S.o_edit_prod=e.target.value; S.o_edit_prod_open=true; render(); };
    oep.onfocus = ()=>{ if(_restoringFocus) return; S.o_edit_prod_open=true; render(); };
    oep.onblur  = ()=>setTimeout(()=>{ if(S.o_edit_prod_open){ S.o_edit_prod_open=false; render(); } },150);
  }

  // edit-order customer name autocomplete
  const oen = document.getElementById('oe-name');
  if(oen){
    oen.oninput = e=>{ S.o_edit_name=e.target.value; S.o_edit_name_open=true; render(); };
    oen.onfocus = ()=>{ if(_restoringFocus) return; S.o_edit_name_open=true; render(); };
    oen.onblur  = ()=>setTimeout(()=>{ if(S.o_edit_name_open){ S.o_edit_name_open=false; render(); } },150);
  }

  // editable price + qty + taken inputs on edit-order items (onblur to avoid cursor issues with type=number)
  S.o_edit_items.forEach(item=>{
    const pel = document.getElementById('oe-price-'+item.id);
    if(pel) pel.onblur = e=>{
      const val = parseFloat(e.target.value);
      if(!isNaN(val) && val>=0){ item.price=val; render(); }
    };
    const qel = document.getElementById('oe-qty-'+item.id);
    if(qel) qel.onblur = e=>{
      const val = parseInt(e.target.value);
      if(!isNaN(val) && val>0){ item.quantity=val; if((item.taken||0)>val) item.taken=val; render(); }
      else if(!isNaN(val) && val<=0){ S.o_edit_items=S.o_edit_items.filter(i=>i.id!==item.id); render(); }
    };
    const tel = document.getElementById('oe-taken-'+item.id);
    if(tel) tel.onblur = e=>{
      const val = parseInt(e.target.value);
      item.taken = isNaN(val) ? 0 : Math.max(0, Math.min(item.quantity, val));
      render();
    };
  });

  // edit-order payment radios + custom amount
  document.querySelectorAll('input[name="oe-pay"]').forEach(r=>{
    r.onchange = e => { S.o_edit_pay_mode = e.target.value; render(); };
  });
  const oepc = document.getElementById('oe-pay-custom');
  if(oepc) oepc.onblur = e => {
    const v = parseFloat(e.target.value);
    S.o_edit_pay_custom = (isNaN(v) || v < 0) ? '' : String(v);
  };

  // reports period pills
  document.querySelectorAll('[data-r-period]').forEach(el=>{
    el.onclick = ()=>{ S.r_period=el.dataset.rPeriod; render(); };
  });

  // customers search + inputs
  const cus = document.getElementById('cu-search');
  if(cus) cus.oninput = e=>{ S.cu_search = e.target.value; render(); };
  const cpa = document.getElementById('cu-pay-amount');
  if(cpa) cpa.oninput = e=>{ S.cu_pay_amount = e.target.value; };
  const cpn = document.getElementById('cu-pay-note');
  if(cpn) cpn.oninput = e=>{ S.cu_pay_note = e.target.value; };
  const cen = document.getElementById('cu-edit-name');
  if(cen) cen.oninput = e=>{ S.cu_edit_name = e.target.value; };
  const cep = document.getElementById('cu-edit-phone');
  if(cep) cep.oninput = e=>{ S.cu_edit_phone = e.target.value; };
  const cnt = document.getElementById('cu-edit-notes');
  if(cnt) cnt.oninput = e=>{ S.cu_edit_notes = e.target.value; };

  // dropdown picks: use onmousedown + preventDefault so blur can't close the list first
  document.querySelectorAll('[data-action="pick-cust"],[data-action="pick-prod"],[data-action="oe-pick-prod"],[data-action="oe-pick-cust"]').forEach(el=>{
    el.onmousedown = e=>{ e.preventDefault(); handleAction(e, el); };
  });

  // all other click actions
  document.querySelectorAll('[data-action]:not([data-action="pick-cust"]):not([data-action="pick-prod"]):not([data-action="oe-pick-prod"]):not([data-action="oe-pick-cust"])').forEach(el=>{
    el.onclick = e=>handleAction(e, el);
  });
  document.querySelectorAll('[data-action="toggle-item"]').forEach(el=>{
    el.onchange = e=>handleAction(e,el);
  });
}

async function handleAction(e, el){
  const a = el.dataset.action;

  if(a==='go-orders'){ S.tab='orders'; render(); }

  // ── products ──
  else if(a==='save-product'){
    const name = document.getElementById('p-name').value.trim();
    const cat  = document.getElementById('p-cat-inp').value.trim();
    const price= parseFloat(document.getElementById('p-price').value);
    const stock= parseInt(document.getElementById('p-stock').value);
    if(!name||!cat||isNaN(price)||isNaN(stock)) return toast('All fields required','error');
    try {
      const url = S.p_editId?'/api/products/'+S.p_editId:'/api/products';
      await api(url,{method:S.p_editId?'PUT':'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name,category:cat,price,stock})});
      toast(S.p_editId?'Product updated':'Product added','success');
      S.p_editId=null; S.p_form={name:'',category:'',price:'',stock:''};
      await fetchAll();
    } catch(err){ toast(err.message,'error'); }
  }
  else if(a==='cancel-edit'){ S.p_editId=null; S.p_form={name:'',category:'',price:'',stock:''}; render(); }
  else if(a==='edit-product'){
    const p = S.products.find(x=>x.id==el.dataset.id);
    if(!p) return;
    S.p_editId=p.id; S.p_form={name:p.name,category:p.category,price:p.price,stock:p.stock}; render();
  }
  else if(a==='del-product'){
    if(!await confirm('Delete "'+el.dataset.name+'"?')) return;
    try{ await api('/api/products/'+el.dataset.id,{method:'DELETE'}); toast('Deleted','success'); await fetchAll(); }
    catch(err){ toast(err.message,'error'); }
  }

  // ── create order ──
  else if(a==='pick-cust'){ S.c_cust=el.dataset.val; S.c_cust_open=false; render(); }
  else if(a==='pick-prod'){
    const id=parseInt(el.dataset.id), name=el.dataset.name, price=parseFloat(el.dataset.price);
    const ex = S.c_items.find(i=>i.id===id);
    if(ex) ex.qty++; else S.c_items.push({id,name,price,qty:1,taken:0});
    S.c_prod=''; S.c_prod_open=false; render();
  }
  else if(a==='qty-minus'){
    const id=parseInt(el.dataset.id), it=S.c_items.find(i=>i.id===id);
    if(it){ it.qty--; if(it.qty<1) S.c_items=S.c_items.filter(i=>i.id!==id); render(); }
  }
  else if(a==='qty-plus'){
    const it=S.c_items.find(i=>i.id===parseInt(el.dataset.id));
    if(it){ it.qty++; render(); }
  }
  else if(a==='remove-item'){ S.c_items=S.c_items.filter(i=>i.id!==parseInt(el.dataset.id)); render(); }
  else if(a==='place-order'){
    if(!S.c_cust.trim()) return toast('Customer name required','error');
    if(!S.c_items.length) return toast('Add at least one item','error');
    const total = S.c_items.reduce((s,i)=>s+i.price*i.qty,0);
    const paid = S.c_pay_mode==='full' ? total :
                 S.c_pay_mode==='custom' ? Math.max(0, parseFloat(S.c_pay_custom)||0) : 0;
    try{
      await api('/api/orders',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({
        customer_name:S.c_cust.trim(),
        items:S.c_items.map(i=>({id:i.id,name:i.name,price:i.price,quantity:i.qty,taken:Math.max(0,Math.min(i.qty,parseInt(i.taken)||0))})),
        subtotal:total,tax:0,total,amount_paid:paid
      })});
      toast('Order created!','success');
      S.c_cust=''; S.c_items=[]; S.c_pay_mode='unpaid'; S.c_pay_custom='';
      await fetchAll();
    } catch(err){ toast(err.message,'error'); }
  }

  // ── orders ──
  else if(a==='toggle-delivered'){
    e.stopPropagation();
    const orderId=parseInt(el.dataset.id), order=S.orders.find(o=>o.id===orderId);
    if(!order) return;
    const nowDelivered = !order.delivered_at;
    order.delivered_at = nowDelivered ? new Date().toISOString() : null;
    render();
    try{
      await fetch('/api/orders/'+orderId+'/delivered',{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({delivered:nowDelivered})});
      toast(nowDelivered?'Marked delivered':'Marked not delivered','success');
    } catch(err){ toast('Update failed','error'); await fetchAll(); }
  }
  else if(a==='toggle-paid'){
    e.stopPropagation();
    const orderId=parseInt(el.dataset.id), order=S.orders.find(o=>o.id===orderId);
    if(!order) return;
    const total = parseFloat(order.total)||0;
    const paid  = parseFloat(order.amount_paid)||0;
    const newPaid = paid >= total && total > 0 ? 0 : total;
    order.amount_paid = newPaid; render();
    try{
      await fetch('/api/orders/'+orderId+'/paid',{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({amount_paid:newPaid})});
      toast(newPaid>0?'Marked paid':'Marked unpaid','success');
    } catch(err){ toast('Update failed','error'); await fetchAll(); }
  }
  else if(a==='toggle-order'){
    const id=parseInt(el.dataset.id);
    if(S.o_editing && S.o_editing!==id){ S.o_editing=null; S.o_edit_items=[]; S.o_edit_prod=''; }
    S.o_expanded = S.o_expanded===id?null:id; render();
  }
  else if(a==='start-edit-order'){
    const orderId=parseInt(el.dataset.id);
    const order=S.orders.find(o=>o.id===orderId);
    if(!order) return;
    S.o_editing=orderId;
    S.o_edit_items=parseItems(order.items).map(i=>({
      id:i.id, name:i.name,
      price:parseFloat(i.price)||0,
      quantity:parseInt(i.quantity)||0,
      taken:parseInt(i.taken)||0
    }));
    S.o_edit_name=order.customer_name||''; S.o_edit_name_open=false;
    const ototal = parseFloat(order.total)||0, opaid = parseFloat(order.amount_paid)||0;
    if(opaid <= 0) { S.o_edit_pay_mode='unpaid'; S.o_edit_pay_custom=''; }
    else if(opaid >= ototal) { S.o_edit_pay_mode='full'; S.o_edit_pay_custom=''; }
    else { S.o_edit_pay_mode='custom'; S.o_edit_pay_custom=String(opaid); }
    S.o_edit_prod=''; S.o_edit_prod_open=false; S.o_expanded=orderId; render();
  }
  else if(a==='cancel-edit-order'){
    S.o_editing=null; S.o_edit_items=[]; S.o_edit_prod='';
    S.o_edit_name=''; S.o_edit_name_open=false;
    S.o_edit_pay_mode='unpaid'; S.o_edit_pay_custom=''; render();
  }
  else if(a==='oe-pick-cust'){ S.o_edit_name=el.dataset.val; S.o_edit_name_open=false; render(); }
  else if(a==='oe-qty-minus'){
    const id=parseInt(el.dataset.id), it=S.o_edit_items.find(i=>i.id===id);
    if(it){ it.quantity--; if(it.quantity<1) S.o_edit_items=S.o_edit_items.filter(i=>i.id!==id); render(); }
  }
  else if(a==='oe-qty-plus'){
    const id=parseInt(el.dataset.id), it=S.o_edit_items.find(i=>i.id===id);
    if(it){ it.quantity++; render(); }
  }
  else if(a==='oe-remove'){
    S.o_edit_items=S.o_edit_items.filter(i=>i.id!==parseInt(el.dataset.id)); render();
  }
  else if(a==='oe-pick-prod'){
    const id=parseInt(el.dataset.id), name=el.dataset.name, price=parseFloat(el.dataset.price);
    const ex=S.o_edit_items.find(i=>i.id===id);
    if(ex) ex.quantity++; else S.o_edit_items.push({id,name,price,quantity:1,taken:0});
    S.o_edit_prod=''; S.o_edit_prod_open=false; render();
  }
  else if(a==='save-edit-order'){
    const orderId=parseInt(el.dataset.id);
    if(!S.o_edit_items.length) return toast('Add at least one item','error');
    if(!S.o_edit_name.trim()) return toast('Customer name required','error');
    const total = S.o_edit_items.reduce((s,i)=>s+i.price*i.quantity,0);
    const paid = S.o_edit_pay_mode==='full' ? total :
                 S.o_edit_pay_mode==='custom' ? Math.max(0, parseFloat(S.o_edit_pay_custom)||0) : 0;
    const itemsOut = S.o_edit_items.map(i=>({
      id:i.id, name:i.name, price:i.price, quantity:i.quantity,
      taken:Math.max(0,Math.min(i.quantity,parseInt(i.taken)||0))
    }));
    try{
      await api('/api/orders/'+orderId,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({
        items:itemsOut, customer_name:S.o_edit_name.trim(), amount_paid:paid
      })});
      S.o_editing=null; S.o_edit_items=[]; S.o_edit_prod='';
      S.o_edit_name=''; S.o_edit_name_open=false;
      S.o_edit_pay_mode='unpaid'; S.o_edit_pay_custom='';
      toast('Order updated','success');
      await fetchAll();
    } catch(err){ toast(err.message,'error'); }
  }
  else if(a==='toggle-item'){
    const orderId=parseInt(el.dataset.orderId), idx=parseInt(el.dataset.idx);
    const order = S.orders.find(o=>o.id===orderId);
    if(!order) return;
    const items = parseItems(order.items).map((it,i)=>{
      const q = parseInt(it.quantity)||0, t = parseInt(it.taken)||0;
      if(t >= q) return {...it, loaded:true};
      return i===idx ? {...it,loaded:!it.loaded} : it;
    });
    const status = items.every(it=>it.loaded)?'loaded':'pending';
    order.items=JSON.stringify(items); order.status=status; render();
    try{ await fetch('/api/orders/'+orderId+'/items',{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({items,status})}); }
    catch(err){ toast('Update failed','error'); await fetchAll(); }
  }
  else if(a==='mark-all'){
    const orderId=parseInt(el.dataset.id), order=S.orders.find(o=>o.id===orderId);
    if(!order) return;
    const items = parseItems(order.items).map(it=>({...it,loaded:true}));
    order.items=JSON.stringify(items); order.status='loaded'; render();
    try{ await fetch('/api/orders/'+orderId+'/items',{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({items,status:'loaded'})}); toast('Marked as loaded','success'); }
    catch(err){ toast('Update failed','error'); await fetchAll(); }
  }
  else if(a==='del-order'){
    if(!await confirm('Delete this order?')) return;
    try{ await api('/api/orders/'+el.dataset.id,{method:'DELETE'}); toast('Deleted','success'); await fetchAll(); }
    catch(err){ toast(err.message,'error'); }
  }
  else if(a==='share-whatsapp'){
    const order = S.orders.find(o=>o.id===parseInt(el.dataset.id));
    if(order) shareWhatsApp(order);
  }
  else if(a==='share-pdf'){
    const order = S.orders.find(o=>o.id===parseInt(el.dataset.id));
    if(order) sharePDF(order);
  }

  // ── customers ──
  else if(a==='toggle-customer'){
    const name = el.dataset.name;
    if(S.cu_expanded === name){
      S.cu_expanded = null; S.cu_detail = null; S.cu_editing = false; render();
    } else {
      S.cu_expanded = name; S.cu_detail = null; S.cu_editing = false;
      S.cu_pay_amount = ''; S.cu_pay_note = '';
      loadCustomerDetail(name); // sets loading and renders
    }
  }
  else if(a==='start-edit-customer'){
    if(!S.cu_detail) return;
    S.cu_editing = true;
    S.cu_edit_name = S.cu_detail.name;
    S.cu_edit_phone = S.cu_detail.phone || '';
    S.cu_edit_notes = S.cu_detail.notes || '';
    render();
  }
  else if(a==='cancel-edit-customer'){
    S.cu_editing = false; render();
  }
  else if(a==='save-customer'){
    const oldName = el.dataset.name;
    const newName = (S.cu_edit_name||'').trim();
    if(!newName) return toast('Name required','error');
    try{
      if(newName !== oldName){
        await api('/api/customers/'+encodeURIComponent(oldName)+'/rename',{
          method:'PUT', headers:{'Content-Type':'application/json'},
          body: JSON.stringify({new_name:newName})
        });
      }
      await api('/api/customers/'+encodeURIComponent(newName)+'/meta',{
        method:'PUT', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({phone:S.cu_edit_phone, notes:S.cu_edit_notes})
      });
      S.cu_editing = false;
      S.cu_expanded = newName;
      toast('Saved','success');
      await fetchAll();
      await loadCustomerDetail(newName);
    } catch(err){ toast(err.message,'error'); }
  }
  else if(a==='log-payment' || a==='log-payment-full'){
    const name = el.dataset.name;
    const amount = a==='log-payment-full'
      ? parseFloat(el.dataset.amount)
      : parseFloat(S.cu_pay_amount);
    if(!amount || amount <= 0) return toast('Enter a valid amount','error');
    try{
      await api('/api/customers/'+encodeURIComponent(name)+'/payments',{
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({amount, note:S.cu_pay_note})
      });
      S.cu_pay_amount = ''; S.cu_pay_note = '';
      toast('Payment logged','success');
      await fetchAll();
      await loadCustomerDetail(name);
    } catch(err){ toast(err.message,'error'); }
  }
  else if(a==='del-payment'){
    if(!await confirm('Delete this payment? Order balances will be restored.')) return;
    const id = parseInt(el.dataset.id);
    const name = el.dataset.name;
    try{
      await api('/api/payments/'+id,{method:'DELETE'});
      toast('Payment deleted','success');
      await fetchAll();
      await loadCustomerDetail(name);
    } catch(err){ toast(err.message,'error'); }
  }
  else if(a==='goto-customer-orders'){
    const name = el.dataset.name;
    S.tab = 'orders';
    S.o_search = name;
    S.o_filter = 'all';
    render();
  }
}

// ═══════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════
render();
fetchAll();
</script>
</body>
</html>
