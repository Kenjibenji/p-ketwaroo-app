<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>P. Ketwaroo &amp; Sons</title>
<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.2/dist/jspdf.umd.min.js" defer></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300..700;1,9..40,300..700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ══════════════════════════════════════════════════════════════
   DESIGN TOKENS — Warm terracotta/copper palette
   Base: deep warm espresso (not cold navy)
   Accent: copper (#c8642a) — warm, grounded, wholesale-authentic
   ══════════════════════════════════════════════════════════════ */
:root {
  /* Easing curves (Emil Kowalski) */
  --ease-out: cubic-bezier(0.23, 1, 0.32, 1);
  --ease-in-out: cubic-bezier(0.77, 0, 0.175, 1);
  --ease-drawer: cubic-bezier(0.32, 0.72, 0, 1);

  /* Base surfaces — warm espresso tones */
  --bg:            #0d0a08;
  --surf-1:        #171210;
  --surf-2:        #211a15;
  --surf-3:        #2c221a;
  --border-subtle: #2e231a;
  --border:        #3d2e22;
  --border-strong: #5a4030;

  /* Text */
  --text-1: #f2e8df;   /* primary — warm cream */
  --text-2: #b89c88;   /* secondary — warm muted */
  --text-3: #7a6050;   /* tertiary — warm dim */

  /* Brand: copper */
  --brand:    #c8642a;
  --brand-hi: #d97840;
  --brand-lo: #8f4018;

  /* Semantic colours */
  --green:    #2db870;
  --green-bg: #0a2418;
  --green-bd: #1a5038;
  --amber:    #e09820;
  --amber-bg: #231800;
  --amber-bd: #5a3a00;
  --red:      #d44040;
  --red-bg:   #260d0d;
  --red-bd:   #6a1818;
  --blue:     #5a8fe0;
  --blue-bg:  #0e1a30;
  --blue-bd:  #1e3a70;

  /* Type scale — DM Sans, 1.25 modular ratio */
  --text-xs:   0.75rem;   /* 12px */
  --text-sm:   0.875rem;  /* 14px */
  --text-base: 1rem;      /* 16px */
  --text-md:   1.125rem;  /* 18px */
  --text-lg:   1.25rem;   /* 20px */
  --text-xl:   1.5rem;    /* 24px */
  --text-2xl:  1.875rem;  /* 30px */

  /* Spacing scale — 4px base */
  --sp-1:  0.25rem;
  --sp-2:  0.5rem;
  --sp-3:  0.75rem;
  --sp-4:  1rem;
  --sp-5:  1.25rem;
  --sp-6:  1.5rem;
  --sp-8:  2rem;
  --sp-10: 2.5rem;
  --sp-12: 3rem;

  /* Radius */
  --r-sm:   4px;
  --r-md:   8px;
  --r-lg:   12px;
  --r-xl:   16px;
  --r-full: 9999px;
}

/* ── Reset ──────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text-1);
  font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  font-size: var(--text-sm);
  font-optical-sizing: auto;
  min-height: 100vh;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}
button  { cursor: pointer; border: none; font-family: inherit; font-size: var(--text-sm); }
input, select, textarea { font-family: inherit; font-size: var(--text-sm); }

/* ── Header ─────────────────────────────────────────────────── */
.header {
  background: var(--surf-1);
  border-bottom: 1px solid var(--border-subtle);
  padding: var(--sp-3) var(--sp-6);
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: var(--sp-4);
  position: sticky;
  top: 0;
  z-index: 50;
}
.header-left { min-width: 0; display: flex; align-items: center; gap: var(--sp-3); }

/* Wordmark: PK monogram + name */
.header-monogram {
  width: 34px;
  height: 34px;
  border-radius: var(--r-sm);
  background: var(--brand);
  color: #fff;
  font-size: 13px;
  font-weight: 700;
  letter-spacing: -0.5px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  user-select: none;
}
.header-wordmark { min-width: 0; }
.header-logo {
  font-size: var(--text-base);
  font-weight: 600;
  color: var(--text-1);
  letter-spacing: -0.2px;
  line-height: 1.2;
}
.header-sub {
  font-size: var(--text-xs);
  color: var(--text-3);
  margin-top: 1px;
  letter-spacing: 0.02em;
}

/* ── Navigation ─────────────────────────────────────────────── */
.nav {
  background: var(--surf-1);
  border-bottom: 1px solid var(--border-subtle);
  padding: var(--sp-2) var(--sp-6);
  display: flex;
  gap: var(--sp-1);
  overflow-x: auto;
  scrollbar-width: none;
  position: sticky;
  top: 57px;
  z-index: 49;
}
.nav::-webkit-scrollbar { display: none; }
.nav-btn {
  background: none;
  color: var(--text-2);
  padding: var(--sp-2) var(--sp-3);
  border-radius: var(--r-sm);
  white-space: nowrap;
  font-size: var(--text-sm);
  font-weight: 500;
  transition: color 150ms var(--ease-out), background 150ms var(--ease-out);
}
@media (hover: hover) and (pointer: fine) {
  .nav-btn:hover { color: var(--text-1); background: var(--surf-2); }
}
.nav-btn.active {
  color: var(--brand-hi);
  background: color-mix(in srgb, var(--brand) 14%, transparent);
}
.nav-btn:focus-visible { outline: 2px solid var(--brand); outline-offset: 1px; border-radius: var(--r-sm); }

/* ── Main content ───────────────────────────────────────────── */
.main { padding: var(--sp-6); max-width: 1200px; margin: 0 auto; }

/* ── Page titles ────────────────────────────────────────────── */
.title-display {
  font-size: var(--text-2xl);
  font-weight: 700;
  color: var(--text-1);
  letter-spacing: -0.5px;
  margin-bottom: var(--sp-5);
  line-height: 1.1;
}

/* ── Cards ──────────────────────────────────────────────────── */
.card {
  background: var(--surf-1);
  border: 1px solid var(--border-subtle);
  border-radius: var(--r-lg);
  padding: var(--sp-5);
  margin-bottom: var(--sp-5);
}

/* ── Stats — open, numbers-first layout ─────────────────────── */
.stats {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: var(--sp-4);
  margin-bottom: var(--sp-6);
}
.stat {
  background: var(--surf-1);
  border: 1px solid var(--border-subtle);
  border-radius: var(--r-lg);
  padding: var(--sp-5);
}
.stat-val {
  font-size: var(--text-xl);
  font-weight: 700;
  color: var(--text-1);
  font-family: 'DM Mono', ui-monospace, monospace;
  font-variant-numeric: tabular-nums;
  letter-spacing: -0.5px;
  line-height: 1.1;
  margin-bottom: var(--sp-1);
}
.stat-lbl {
  font-size: var(--text-xs);
  color: var(--text-3);
  font-weight: 500;
  letter-spacing: 0.04em;
  text-transform: uppercase;
}
/* Accent line — thin top border instead of fat left side-border */
.stat-icon { display: none; }
.stat-top  { display: none; }
.stat.blue  { border-top: 2px solid var(--blue); }
.stat.green { border-top: 2px solid var(--green); }
.stat.amber { border-top: 2px solid var(--amber); }
.stat.red   { border-top: 2px solid var(--red); }
/* Legacy bold variants → remap to token-based cards */
.stat.bold        { padding: var(--sp-5); border-radius: var(--r-lg); border: 1px solid var(--border-subtle); background: var(--surf-1); min-height: unset; }
.stat.bold-coral  { border-top: 2px solid var(--red); }
.stat.bold-lavender { border-top: 2px solid var(--blue); }
.stat.bold-yellow { border-top: 2px solid var(--amber); }
.stat.bold-mint   { border-top: 2px solid var(--green); }
.stat.bold .stat-val { font-size: var(--text-xl); color: var(--text-1); letter-spacing: -0.5px; }
.stat.bold .stat-top { display: none; }
.stat.bold .stat-icon { display: none; }
.stat.bold .delta { background: var(--surf-2); color: var(--text-2); }

/* Delta chip — inline */
.delta {
  display: inline-flex;
  align-items: center;
  gap: 3px;
  padding: 2px var(--sp-2);
  border-radius: var(--r-full);
  font-size: var(--text-xs);
  font-weight: 600;
  width: fit-content;
  margin-top: var(--sp-1);
}
.delta.up   { background: var(--green-bg); color: var(--green); }
.delta.down { background: var(--red-bg);   color: var(--red); }
.delta.flat { background: var(--surf-2);   color: var(--text-3); }

/* ── Forms ──────────────────────────────────────────────────── */
.form-row { display: flex; gap: var(--sp-3); flex-wrap: wrap; margin-bottom: var(--sp-3); }
.fg { display: flex; flex-direction: column; gap: 5px; flex: 1; min-width: 110px; }
.fg label {
  font-size: var(--text-xs);
  color: var(--text-3);
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.06em;
}
.input, .select, .textarea {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--r-md);
  padding: var(--sp-2) var(--sp-3);
  color: var(--text-1);
  outline: none;
  width: 100%;
  transition: border-color 150ms var(--ease-out), box-shadow 150ms var(--ease-out);
}
.input:focus, .select:focus, .textarea:focus {
  border-color: var(--brand);
  box-shadow: 0 0 0 3px color-mix(in srgb, var(--brand) 20%, transparent);
}
.textarea { min-height: 60px; resize: vertical; font-family: inherit; }

/* ── Buttons ─────────────────────────────────────────────────── */
.btn {
  padding: var(--sp-2) var(--sp-4);
  border-radius: var(--r-md);
  font-weight: 500;
  font-size: var(--text-sm);
  transition: filter 150ms var(--ease-out), transform 100ms var(--ease-out);
  letter-spacing: -0.1px;
}
@media (hover: hover) and (pointer: fine) { .btn:hover { filter: brightness(1.12); } }
.btn:active { transform: scale(0.97); filter: brightness(0.92); }
.btn:focus-visible { outline: 2px solid var(--brand); outline-offset: 2px; }
.btn.primary { background: var(--brand); color: #fff; }
.btn.success { background: var(--green); color: #fff; }
.btn.danger  { background: var(--red);   color: #fff; }
.btn.ghost   { background: var(--surf-2); color: var(--text-1); border: 1px solid var(--border); }
.btn.sm  { padding: 5px var(--sp-3); font-size: var(--text-xs); }
.btn.xs  { padding: 3px var(--sp-2); font-size: var(--text-xs); }
.btn-row { display: flex; gap: var(--sp-2); flex-wrap: wrap; align-items: center; }

/* ── Tables ─────────────────────────────────────────────────── */
table  { width: 100%; border-collapse: collapse; }
th {
  text-align: left;
  font-size: var(--text-xs);
  color: var(--text-3);
  font-weight: 500;
  padding: var(--sp-2) var(--sp-3);
  border-bottom: 1px solid var(--border-subtle);
  text-transform: uppercase;
  letter-spacing: 0.06em;
}
td {
  padding: 11px var(--sp-3);
  border-bottom: 1px solid var(--border-subtle);
  vertical-align: middle;
}
tr:last-child td { border-bottom: none; }
tr.clickable { cursor: pointer; }
@media (hover: hover) and (pointer: fine) {
  tr.clickable:hover td { background: var(--surf-2); }
}
tr.lowstock td { background: color-mix(in srgb, var(--red-bg) 60%, transparent); }

/* ── Badges ─────────────────────────────────────────────────── */
.badge {
  display: inline-block;
  padding: 2px var(--sp-2);
  border-radius: var(--r-sm);
  font-size: var(--text-xs);
  font-weight: 600;
  letter-spacing: 0.02em;
}
.clickable-badge, .badge.click {
  cursor: pointer;
  user-select: none;
  transition: filter 150ms var(--ease-out), transform 100ms var(--ease-out);
}
@media (hover: hover) and (pointer: fine) {
  .clickable-badge:hover, .badge.click:hover { filter: brightness(1.2); }
}
.clickable-badge:active, .badge.click:active { transform: scale(0.95); }
.badge.pending    { background: var(--amber-bg); color: var(--amber); border: 1px solid var(--amber-bd); }
.badge.loaded     { background: var(--green-bg); color: var(--green); border: 1px solid var(--green-bd); }
.badge.paid       { background: var(--green-bg); color: var(--green); border: 1px solid var(--green-bd); }
.badge.partial    { background: var(--blue-bg);  color: var(--blue);  border: 1px solid var(--blue-bd); }
.badge.unpaid     { background: var(--red-bg);   color: var(--red);   border: 1px solid var(--red-bd); }
.badge.pickup     { background: var(--blue-bg);  color: var(--blue);  border: 1px solid var(--blue-bd); }
.badge.delivered  { background: var(--green-bg); color: var(--green); border: 1px solid var(--green-bd); }
.badge.undelivered{ background: var(--amber-bg); color: var(--amber); border: 1px solid var(--amber-bd); }
.badge.out        { background: var(--red-bg);   color: var(--red);   border: 1px solid var(--red-bd); }
.badge.critical   { background: var(--red-bg);   color: var(--red);   border: 1px solid var(--red-bd); }
.badge.low        { background: var(--amber-bg); color: var(--amber); border: 1px solid var(--amber-bd); }

/* ── Pills / filter bar ─────────────────────────────────────── */
.pills { display: flex; gap: var(--sp-2); flex-wrap: wrap; margin-bottom: var(--sp-4); }
.pill {
  padding: 5px var(--sp-4);
  border-radius: var(--r-full);
  font-size: var(--text-xs);
  font-weight: 500;
  background: var(--surf-2);
  color: var(--text-2);
  cursor: pointer;
  border: 1px solid var(--border);
  user-select: none;
  transition: color 150ms var(--ease-out), background 150ms var(--ease-out), border-color 150ms var(--ease-out), transform 100ms var(--ease-out);
}
@media (hover: hover) and (pointer: fine) { .pill:hover { color: var(--text-1); border-color: var(--border-strong); } }
.pill:active { transform: scale(0.97); }
.pill.active {
  background: color-mix(in srgb, var(--brand) 16%, transparent);
  color: var(--brand-hi);
  border-color: var(--brand-lo);
}

/* ── Search ──────────────────────────────────────────────────── */
.search-wrap { position: relative; margin-bottom: var(--sp-4); }
.search-wrap .input { padding-left: 34px; }
.search-ico { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); color: var(--text-3); pointer-events: none; font-size: 13px; }

/* ── Autocomplete dropdown ───────────────────────────────────── */
.ac-wrap { position: relative; }
.ac-drop {
  position: absolute;
  top: calc(100% + 4px);
  left: 0; right: 0;
  background: var(--surf-2);
  border: 1px solid var(--border);
  border-radius: var(--r-lg);
  z-index: 50;
  max-height: 200px;
  overflow-y: auto;
  display: none;
  box-shadow: 0 12px 32px rgba(0,0,0,0.5);
}
.ac-drop.open { display: block; }
.ac-item { padding: var(--sp-2) var(--sp-3); cursor: pointer; font-size: var(--text-sm); transition: background 100ms var(--ease-out); }
@media (hover: hover) and (pointer: fine) { .ac-item:hover { background: var(--surf-3); } }
.ac-item .sub { font-size: var(--text-xs); color: var(--text-3); margin-top: 2px; }

/* ── Order cards ─────────────────────────────────────────────── */
.ord-card {
  background: var(--surf-1);
  border: 1px solid var(--border-subtle);
  border-radius: var(--r-lg);
  margin-bottom: var(--sp-2);
  overflow: hidden;
  transition: border-color 150ms var(--ease-out);
}
/* To-deliver: amber top accent instead of fat left border */
.ord-card.to-deliver { border-top: 2px solid var(--amber); }
.ord-card:focus-within { border-color: var(--border-strong); }
.ord-hdr {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: var(--sp-4);
  cursor: pointer;
  flex-wrap: wrap;
  gap: var(--sp-2);
  transition: background 150ms var(--ease-out);
}
@media (hover: hover) and (pointer: fine) { .ord-hdr:hover { background: var(--surf-2); } }
.ord-meta { font-size: var(--text-xs); color: var(--text-3); margin-top: 3px; }
.ord-body { padding: 0 var(--sp-4) var(--sp-4); display: none; }
.ord-body.open { display: block; }
.ord-total { font-size: var(--text-md); font-weight: 700; color: var(--text-1); font-family: 'DM Mono', ui-monospace, monospace; font-variant-numeric: tabular-nums; }

/* ── Customer cards ──────────────────────────────────────────── */
.cu-card {
  background: var(--surf-1);
  border: 1px solid var(--border-subtle);
  border-radius: var(--r-lg);
  margin-bottom: var(--sp-2);
  overflow: hidden;
  transition: border-color 150ms var(--ease-out);
}
/* Owes balance: red top accent instead of fat left border */
.cu-card.owes { border-top: 2px solid var(--red); }
.cu-meta {
  padding: var(--sp-3);
  background: var(--bg);
  border-radius: var(--r-md);
  font-size: var(--text-sm);
  margin-bottom: var(--sp-4);
  border: 1px solid var(--border-subtle);
  color: var(--text-2);
}
.cu-meta .muted { color: var(--text-3); }
.cu-edit { background: var(--bg); border-radius: var(--r-md); padding: var(--sp-3); margin-bottom: var(--sp-4); border: 1px solid var(--border-subtle); }
.cu-edit textarea.input { resize: vertical; min-height: 48px; }
.cu-section-grid { display: grid; grid-template-columns: 1fr 1fr; gap: var(--sp-4); margin-bottom: var(--sp-4); }
@media (max-width: 640px) { .cu-section-grid { grid-template-columns: 1fr; } }
.cu-section-hdr {
  font-size: var(--text-xs);
  text-transform: uppercase;
  letter-spacing: 0.05em;
  color: var(--text-3);
  margin-bottom: var(--sp-2);
  font-weight: 600;
}
.cu-row {
  display: flex;
  align-items: center;
  gap: var(--sp-3);
  padding: var(--sp-2) var(--sp-3);
  background: var(--bg);
  border-radius: var(--r-md);
  margin-bottom: var(--sp-2);
  border: 1px solid var(--border-subtle);
}
.cu-paybox {
  background: var(--bg);
  border: 1px solid var(--border-subtle);
  border-radius: var(--r-md);
  padding: var(--sp-3);
  margin-bottom: var(--sp-3);
}
.muted { color: var(--text-2); font-size: var(--text-sm); }

/* ── Checklist (To-Deliver items) ────────────────────────────── */
.chk-item {
  display: flex;
  align-items: center;
  gap: var(--sp-3);
  padding: var(--sp-2) 0;
  border-bottom: 1px solid var(--border-subtle);
}
.chk-item:last-child { border-bottom: none; }
/* Emil-style checkbox: hide native, draw custom */
.chk-item input[type=checkbox] {
  appearance: none;
  -webkit-appearance: none;
  width: 18px; height: 18px;
  border-radius: var(--r-sm);
  border: 1.5px solid var(--border-strong);
  background: var(--bg);
  cursor: pointer;
  flex-shrink: 0;
  position: relative;
  transition: background 150ms var(--ease-out), border-color 150ms var(--ease-out);
}
.chk-item input[type=checkbox]:checked {
  background: var(--green);
  border-color: var(--green);
}
.chk-item input[type=checkbox]:checked::after {
  content: '';
  position: absolute;
  left: 4px; top: 2px;
  width: 6px; height: 9px;
  border: 2px solid #fff;
  border-left: none; border-top: none;
  transform: rotate(42deg);
}
.chk-item.done .iname { text-decoration: line-through; color: var(--text-3); }

/* ── Order items ─────────────────────────────────────────────── */
.oi-row {
  display: flex;
  align-items: center;
  gap: var(--sp-3);
  padding: var(--sp-2) 0;
  border-bottom: 1px solid var(--border-subtle);
  flex-wrap: wrap;
}
.oi-row:last-child { border-bottom: none; }
.oi-name { flex: 1; min-width: 0; font-weight: 500; }
.qty-btn {
  width: 28px; height: 28px;
  border-radius: var(--r-sm);
  background: var(--surf-2);
  color: var(--text-1);
  font-size: 18px;
  line-height: 1;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  transition: background 150ms var(--ease-out), transform 100ms var(--ease-out);
}
@media (hover: hover) and (pointer: fine) { .qty-btn:hover { background: var(--brand); color: #fff; } }
.qty-btn:active { transform: scale(0.93); }
.total-bar {
  background: var(--bg);
  border-radius: var(--r-md);
  padding: var(--sp-4);
  margin-top: var(--sp-3);
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: var(--sp-2);
  border: 1px solid var(--border-subtle);
}
.total-lbl { color: var(--text-3); font-size: var(--text-sm); }
.total-val { font-size: var(--text-lg); font-weight: 700; color: var(--text-1); font-family: 'DM Mono', ui-monospace, monospace; font-variant-numeric: tabular-nums; }

/* ── Taken-at-counter widget ─────────────────────────────────── */
.taken-wrap {
  display: flex;
  align-items: center;
  gap: var(--sp-1);
  color: var(--text-3);
  font-size: var(--text-xs);
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.04em;
}
.taken-wrap input {
  width: 48px;
  padding: 4px var(--sp-2);
  text-align: center;
  color: var(--text-1);
  font-weight: 600;
  font-size: var(--text-sm);
  font-family: 'DM Mono', ui-monospace, monospace;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--r-sm);
  outline: none;
}
.taken-wrap input:focus { border-color: var(--brand); }

/* ── Payment options ─────────────────────────────────────────── */
.pay-opts { display: flex; flex-direction: column; gap: var(--sp-2); margin-top: var(--sp-2); }
.pay-opt {
  display: flex;
  align-items: center;
  gap: var(--sp-2);
  padding: var(--sp-2) var(--sp-3);
  border: 1px solid var(--border);
  border-radius: var(--r-md);
  cursor: pointer;
  font-size: var(--text-sm);
  color: var(--text-2);
  transition: border-color 150ms var(--ease-out), background 150ms var(--ease-out);
}
@media (hover: hover) and (pointer: fine) { .pay-opt:hover { border-color: var(--border-strong); color: var(--text-1); } }
.pay-opt.active { border-color: var(--brand-lo); background: color-mix(in srgb, var(--brand) 10%, transparent); color: var(--text-1); }
.pay-opt input[type=radio] { margin: 0; accent-color: var(--brand); }
.pay-opt input[type=number] { margin-left: auto; width: 110px; }

/* ── Toasts ──────────────────────────────────────────────────── */
#toasts { position: fixed; top: var(--sp-5); right: var(--sp-5); z-index: 999; display: flex; flex-direction: column; gap: var(--sp-2); pointer-events: none; }
.toast {
  padding: var(--sp-3) var(--sp-5);
  border-radius: var(--r-lg);
  font-size: var(--text-sm);
  font-weight: 500;
  min-width: 200px;
  max-width: 320px;
  pointer-events: all;
  cursor: pointer;
  animation: toast-in 220ms var(--ease-out) both;
  letter-spacing: -0.1px;
}
.toast.success { background: var(--green-bg); color: var(--green); border: 1px solid var(--green-bd); }
.toast.error   { background: var(--red-bg);   color: var(--red);   border: 1px solid var(--red-bd); }
.toast.info    { background: var(--surf-2);   color: var(--text-2); border: 1px solid var(--border); }
@keyframes toast-in { from { opacity: 0; transform: translateX(16px) scale(0.96); } to { opacity: 1; transform: translateX(0) scale(1); } }

/* ── Spinner ─────────────────────────────────────────────────── */
@keyframes spin { to { transform: rotate(360deg); } }
.loading-wrap { display: flex; align-items: center; justify-content: center; gap: var(--sp-3); padding: var(--sp-10) 0; color: var(--text-3); font-size: var(--text-sm); }
.spinner { width: 18px; height: 18px; border: 2px solid var(--border); border-top-color: var(--brand); border-radius: 50%; animation: spin 0.55s linear infinite; flex-shrink: 0; }

/* ── Confirm modal ───────────────────────────────────────────── */
#modal-bg {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0);
  z-index: 900;
  display: none;
  align-items: center;
  justify-content: center;
  padding: var(--sp-5);
  transition: background 200ms var(--ease-out);
}
#modal-bg.open { background: rgba(0,0,0,0.78); display: flex; }
#modal-box {
  background: var(--surf-2);
  border: 1px solid var(--border);
  border-radius: var(--r-xl);
  padding: var(--sp-6);
  min-width: 300px;
  max-width: 520px;
  width: 100%;
  transform: scale(0.96);
  opacity: 0;
  transition: transform 220ms var(--ease-out), opacity 220ms var(--ease-out);
}
#modal-bg.open #modal-box { transform: scale(1); opacity: 1; }
#modal-msg { margin-bottom: var(--sp-5); line-height: 1.6; color: var(--text-1); }
#modal-actions { display: flex; gap: var(--sp-3); justify-content: flex-end; }

/* ── Scan modal ──────────────────────────────────────────────── */
.scan-modal-bg {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.82);
  z-index: 100;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: var(--sp-5);
}
.scan-modal-box {
  background: var(--surf-2);
  border: 1px solid var(--border);
  border-radius: var(--r-xl);
  max-width: 800px;
  width: 100%;
  max-height: 90vh;
  overflow-y: auto;
  padding: var(--sp-6);
}
.scan-modal-hdr {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: var(--sp-4);
}
.scan-modal-title {
  font-size: var(--text-md);
  font-weight: 600;
  color: var(--text-1);
  letter-spacing: -0.2px;
}
.scan-item-row {
  display: flex;
  align-items: center;
  gap: var(--sp-3);
  padding: var(--sp-2) var(--sp-3);
  border-bottom: 1px solid var(--border-subtle);
  background: var(--bg);
  margin-bottom: 2px;
  border-radius: var(--r-sm);
}
.scan-item-row:last-child { border-bottom: none; }
.scan-item-row input[type=checkbox] {
  appearance: none;
  -webkit-appearance: none;
  width: 18px; height: 18px;
  border-radius: var(--r-sm);
  border: 1.5px solid var(--border-strong);
  background: var(--bg);
  cursor: pointer;
  flex-shrink: 0;
  position: relative;
  transition: background 150ms var(--ease-out), border-color 150ms var(--ease-out);
}
.scan-item-row input[type=checkbox]:checked { background: var(--green); border-color: var(--green); }
.scan-item-row input[type=checkbox]:checked::after {
  content: '';
  position: absolute;
  left: 4px; top: 2px;
  width: 6px; height: 9px;
  border: 2px solid #fff;
  border-left: none; border-top: none;
  transform: rotate(42deg);
}
.scan-item-row input[type=checkbox]:disabled { opacity: 0.4; cursor: not-allowed; }
.conf-badge {
  padding: 2px var(--sp-2);
  border-radius: var(--r-full);
  font-size: var(--text-xs);
  font-weight: 600;
  flex-shrink: 0;
}
.conf-high   { background: var(--green-bg); color: var(--green); border: 1px solid var(--green-bd); }
.conf-medium { background: var(--amber-bg); color: var(--amber); border: 1px solid var(--amber-bd); }
.conf-low    { background: var(--red-bg);   color: var(--red);   border: 1px solid var(--red-bd); }

/* ── Section typography ──────────────────────────────────────── */
.sec-title {
  font-size: var(--text-md);
  font-weight: 600;
  color: var(--text-1);
  margin-bottom: var(--sp-4);
  letter-spacing: -0.2px;
}
.sec-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: var(--sp-4);
  flex-wrap: wrap;
  gap: var(--sp-2);
}
.empty {
  color: var(--text-3);
  padding: var(--sp-8) 0;
  text-align: center;
  font-size: var(--text-sm);
  letter-spacing: 0.01em;
}
.rec-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: var(--sp-3) 0;
  border-bottom: 1px solid var(--border-subtle);
}
.rec-row:last-child { border-bottom: none; }

/* ── Report grid ─────────────────────────────────────────────── */
.report-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: var(--sp-4); margin-bottom: var(--sp-5); }
.rep-row { display: flex; align-items: center; gap: var(--sp-3); padding: var(--sp-2) 0; border-bottom: 1px solid var(--border-subtle); }
.rep-row:last-child { border-bottom: none; }
.rep-name { flex: 1; font-weight: 500; color: var(--text-1); font-size: var(--text-sm); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; min-width: 0; }
.rep-meta { font-size: var(--text-xs); color: var(--text-3); white-space: nowrap; }
.rep-val  { font-weight: 600; color: var(--text-1); font-size: var(--text-sm); min-width: 60px; text-align: right; white-space: nowrap; font-family: 'DM Mono', ui-monospace, monospace; }
.delta-up   { color: var(--green); font-size: var(--text-xs); font-weight: 600; margin-left: var(--sp-2); }
.delta-down { color: var(--red);   font-size: var(--text-xs); font-weight: 600; margin-left: var(--sp-2); }
.delta-flat { color: var(--text-3); font-size: var(--text-xs); margin-left: var(--sp-2); }

/* ── Trend chart ─────────────────────────────────────────────── */
.trend-chart { display: flex; gap: var(--sp-2); align-items: flex-end; height: 180px; padding-top: var(--sp-2); overflow-x: auto; }
.trend-col { flex: 1 0 36px; min-width: 36px; display: flex; flex-direction: column; align-items: center; gap: 4px; height: 100%; }
.trend-bar-wrap { width: 100%; flex: 1; display: flex; align-items: flex-end; min-height: 0; }
/* Use transform-origin bottom + scaleY to avoid layout-thrash on height animation */
.trend-bar { width: 100%; background: linear-gradient(180deg, var(--brand-hi), var(--brand-lo)); border-radius: var(--r-sm) var(--r-sm) 0 0; min-height: 2px; transform-origin: bottom; transition: transform 300ms var(--ease-out); }
.trend-label { font-size: 10px; color: var(--text-3); white-space: nowrap; }
.trend-val   { font-size: 10px; color: var(--text-2); font-weight: 600; height: 14px; font-family: 'DM Mono', ui-monospace, monospace; }

/* ── Number inputs: hide spinners ────────────────────────────── */
input[type=number]::-webkit-inner-spin-button,
input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
input[type=number] { -moz-appearance: textfield; }

/* ── Reduced motion ──────────────────────────────────────────── */
@media (prefers-reduced-motion: reduce) {
  * { transition-duration: 0.01ms !important; animation-duration: 0.01ms !important; animation-iteration-count: 1 !important; }
}

/* ── Mobile ──────────────────────────────────────────────────── */
@media (max-width: 640px) {
  .header { padding: var(--sp-2) var(--sp-4); }
  .header-logo { font-size: var(--text-sm); }
  .header-sub  { font-size: 10px; }
  .nav { padding: var(--sp-2) var(--sp-2); top: 50px; }
  .main { padding: var(--sp-4) var(--sp-3); }
  .card { padding: var(--sp-4); }
  .title-display { font-size: var(--text-xl); margin-bottom: var(--sp-4); }

  /* iOS Safari zooms into inputs with font-size under 16px on focus */
  .input, .select, .textarea,
  input[type=number], input[type=date], input[type=text] { font-size: 16px; }

  /* Touch targets */
  .nav-btn { padding: var(--sp-2) var(--sp-3); }
  .btn { font-size: var(--text-sm); padding: 10px var(--sp-4); min-height: 40px; }
  .btn.sm { font-size: var(--text-xs); padding: var(--sp-2) var(--sp-3); min-height: 36px; }
  .btn.xs { font-size: var(--text-xs); padding: 7px var(--sp-3); min-height: 32px; }
  .qty-btn { width: 36px; height: 36px; font-size: 20px; }
  .pill { padding: var(--sp-2) var(--sp-4); font-size: var(--text-xs); }

  .stats { grid-template-columns: repeat(2, 1fr); gap: var(--sp-3); margin-bottom: var(--sp-4); }
  .stat { padding: var(--sp-4); }
  .stat-val { font-size: var(--text-lg); }
  .fg { min-width: 0; }
  .form-row { gap: var(--sp-2); }
  .oi-row { gap: var(--sp-2); }
  .oi-name { width: 100%; flex: none; }
  .total-val { font-size: var(--text-md); }
  .sec-title { font-size: var(--text-base); }

  /* Tables → card rows on mobile */
  table, tbody, tr, td { display: block; width: 100%; }
  thead { display: none; }
  tr {
    background: var(--surf-1);
    border: 1px solid var(--border-subtle);
    border-radius: var(--r-lg);
    padding: var(--sp-3);
    margin-bottom: var(--sp-3);
  }
  tr.clickable:hover td { background: transparent; }
  td { padding: 4px 0; border-bottom: none; vertical-align: initial; }
  td:last-child:empty { display: none; }
  td:last-child { text-align: right; padding-top: var(--sp-2); }
  td:last-child .btn { margin-left: auto; }

  .ord-body .form-row .fg { flex: 1 1 100%; }
  #modal-bg  { padding: var(--sp-3); }
  #modal-box { min-width: unset; padding: var(--sp-5); }

  .trend-chart { height: 140px; gap: 4px; }
  .trend-col { min-width: 28px; }
  .trend-label, .trend-val { font-size: 9px; }
  .rep-meta { font-size: 11px; }
  .rep-name { font-size: var(--text-xs); }
  .scan-modal-box { padding: var(--sp-4); }
}
</style>
</head>

  <div id="modal-box">
    <div id="modal-msg"></div>
    <div id="modal-actions">
      <button class="btn danger" id="modal-yes">Confirm</button>
      <button class="btn ghost"  id="modal-no">Cancel</button>
    </div>
  </div>
</div>

  <div class="header-left">
    <div class="header-monogram" aria-hidden="true">PK</div>
    <div class="header-wordmark">
      <div class="header-logo">P. Ketwaroo &amp; Sons</div>
      <div class="header-sub">Wholesale Inventory</div>
    </div>
  </div>
</div>

<nav class="nav" id="nav"></nav>

<div class="main" id="main"></div>

<script>
// ═══════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════
const S = {
  tab: 'dashboard',
  products: [], orders: [], customers: [], stats: {},
  // products tab
  p_search: '', p_cat: 'All', p_editId: null,
  p_form: {name:'',category:'',price:'',stock:''},
  // orders tab
  o_search: '', o_filter: 'all', o_expanded: null,
  o_editing: null, o_edit_items: [], o_edit_prod: '', o_edit_prod_open: false,
  o_edit_name: '', o_edit_name_open: false,
  o_edit_pay_mode: 'unpaid', o_edit_pay_custom: '',
  // reports tab
  r_period: 'week',
  // create order tab
  c_cust: '', c_prod: '', c_items: [],
  c_cust_open: false, c_prod_open: false,
  c_pay_mode: 'unpaid', c_pay_custom: '',
  // scan-list (photo of handwritten list)
  scan_open: false, scan_busy: false, scan_results: null, scan_preview: null, scan_error: '',
  // customers tab
  customers_full: [],
  cu_search: '', cu_expanded: null, cu_detail: null, cu_loading: false,
  cu_pay_amount: '', cu_pay_note: '',
  cu_editing: false, cu_edit_name: '', cu_edit_phone: '', cu_edit_notes: '',
};

let _restoringFocus = false;
const fmt = n => parseFloat(n||0).toFixed(2);
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function parseItems(v){ if(Array.isArray(v))return v; try{return JSON.parse(v);}catch(e){return[];} }

// Resize/compress an image File to keep upload payloads small.
// Returns { dataUrl, base64, mime }
function downsizeImage(file, maxDim, quality){
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => {
      const img = new Image();
      img.onload = () => {
        let { width, height } = img;
        const scale = Math.min(1, maxDim / Math.max(width, height));
        width = Math.round(width * scale);
        height = Math.round(height * scale);
        const canvas = document.createElement('canvas');
        canvas.width = width; canvas.height = height;
        canvas.getContext('2d').drawImage(img, 0, 0, width, height);
        const dataUrl = canvas.toDataURL('image/jpeg', quality);
        const base64 = dataUrl.split(',')[1];
        resolve({ dataUrl, base64, mime: 'image/jpeg' });
      };
      img.onerror = reject;
      img.src = reader.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

// ═══════════════════════════════════════════════════════════
// SHARE ORDER (WhatsApp + PDF)
// ═══════════════════════════════════════════════════════════
function formatOrderText(order){
  const items = parseItems(order.items);
  const date = new Date(order.created_at).toLocaleDateString();
  const total = parseFloat(order.total)||0;
  const paid = parseFloat(order.amount_paid)||0;
  const owed = Math.max(0, total - paid);
  const payLine = paid <= 0 ? `Payment: Unpaid — pay on delivery ($${fmt(total)})`
    : paid >= total ? `Payment: Paid in full ($${fmt(total)})`
    : `Payment: $${fmt(paid)} paid · $${fmt(owed)} owed`;
  const lines = [
    `*P. Ketwaroo & Sons*`,
    `Order #${order.id} — ${date}`,
    `Customer: ${order.customer_name}`,
    ``,
    ...items.map(i => {
      const q = parseInt(i.quantity)||0, t = parseInt(i.taken)||0;
      const tail = t>0 ? (t>=q ? '  (all picked up)' : `  (${t} picked up · ${q-t} to deliver)`) : '';
      return `• ${q}× ${i.name} @ $${fmt(i.price)} = $${fmt(i.price*q)}${tail}`;
    }),
    ``,
    `*Total: $${fmt(total)}*`,
    payLine,
    `Status: ${(order.status||'pending')==='loaded'?'Loaded':'Pending'}`
  ];
  return lines.join('\n');
}

function buildOrderPDF(order){
  if(!window.jspdf || !window.jspdf.jsPDF) return null;
  const { jsPDF } = window.jspdf;
  const W = 420, H = 720;
  const doc = new jsPDF({ unit:'pt', format:[W, H] });
  const items = parseItems(order.items);
  const date = new Date(order.created_at).toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' });
  const M = 30, RIGHT = W - M;

  // Soft paper background
  doc.setFillColor(252,252,248);
  doc.rect(10, 10, W-20, H-20, 'F');
  doc.setDrawColor(230,228,220); doc.setLineWidth(1);
  doc.rect(10, 10, W-20, H-20, 'S');

  // Header
  let y = 48;
  doc.setFont('helvetica','bold'); doc.setFontSize(20);
  doc.setTextColor(26,26,26);
  doc.text('P. Ketwaroo & Sons', W/2, y, { align:'center' });

  y += 30;
  doc.setFont('helvetica','normal'); doc.setFontSize(12);
  doc.setTextColor(107,107,107);
  doc.text(`Order #${order.id} — ${date}`, M, y);

  y += 28;
  doc.setFontSize(13);
  doc.setTextColor(107,107,107);
  const forLabel = 'For: ';
  doc.text(forLabel, M, y);
  doc.setFont('helvetica','bold'); doc.setTextColor(26,26,26);
  doc.text(String(order.customer_name||''), M + doc.getTextWidth(forLabel), y);

  // Soft divider
  y += 18;
  doc.setDrawColor(224,221,209); doc.setLineWidth(1);
  doc.line(M, y, RIGHT, y);

  // Items
  y += 28;
  let totalToDeliver = 0;
  for(const it of items){
    if(y > H - 200){ doc.addPage(); y = 48; }
    const q = parseInt(it.quantity)||0;
    const t = parseInt(it.taken)||0;
    const lineTotal = (parseFloat(it.price)||0) * q;

    // Qty (right-aligned bold) | Name | Total (right-aligned bold)
    doc.setFont('helvetica','bold'); doc.setFontSize(13);
    doc.setTextColor(26,26,26);
    doc.text(String(q), M + 28, y, { align:'right' });
    doc.setFont('helvetica','normal');
    doc.text(String(it.name||'').slice(0, 38), M + 44, y);
    doc.setFont('helvetica','bold');
    doc.text('$'+fmt(lineTotal), RIGHT, y, { align:'right' });

    // Status sub-line
    y += 14;
    doc.setFont('helvetica','normal'); doc.setFontSize(10);
    if(q > 0 && t >= q){
      doc.setTextColor(58,138,79); // green
      doc.text('all picked up', M + 44, y);
    } else if(t > 0){
      doc.setTextColor(160,107,28); // amber
      doc.text(`${t} picked up  ·  ${q-t} to deliver`, M + 44, y);
      totalToDeliver += (q-t);
    } else {
      doc.setTextColor(160,107,28);
      doc.text('to deliver', M + 44, y);
      totalToDeliver += q;
    }
    y += 22;
  }

  // Divider
  y += 4;
  doc.setDrawColor(187,182,164); doc.setLineWidth(1);
  doc.line(M, y, RIGHT, y);

  // Total
  y += 26;
  const totalNum = parseFloat(order.total)||0;
  doc.setFont('helvetica','normal'); doc.setFontSize(15);
  doc.setTextColor(26,26,26);
  doc.text('Total', M, y);
  doc.setFont('helvetica','bold'); doc.setFontSize(20);
  doc.text('$'+fmt(totalNum), RIGHT, y, { align:'right' });

  y += 14;
  doc.setDrawColor(187,182,164); doc.setLineWidth(1);
  doc.line(M, y, RIGHT, y);

  // Payment
  y += 26;
  const paidNum = parseFloat(order.amount_paid)||0;
  doc.setFont('helvetica','normal'); doc.setFontSize(11);
  doc.setTextColor(107,107,107);
  doc.text('Payment', M, y);

  y += 20;
  doc.setFontSize(13);
  if(paidNum <= 0){
    doc.setFont('helvetica','bold'); doc.setTextColor(176,58,58);
    doc.text(`Unpaid — $${fmt(totalNum)} balance`, M, y);
  } else if(paidNum >= totalNum){
    doc.setFont('helvetica','bold'); doc.setTextColor(58,138,79);
    doc.text(`Paid in full — $${fmt(totalNum)}`, M, y);
  } else {
    doc.setFont('helvetica','bold'); doc.setTextColor(26,26,26);
    const part1 = `$${fmt(paidNum)} paid`;
    doc.text(part1, M, y);
    const w1 = doc.getTextWidth(part1);
    doc.setFont('helvetica','normal'); doc.setTextColor(107,107,107);
    const sep = '  ·  ';
    doc.text(sep, M + w1, y);
    const w2 = doc.getTextWidth(sep);
    doc.setFont('helvetica','bold'); doc.setTextColor(176,58,58);
    doc.text(`$${fmt(totalNum-paidNum)} balance`, M + w1 + w2, y);
  }

  // Delivery
  y += 32;
  doc.setFont('helvetica','normal'); doc.setFontSize(11);
  doc.setTextColor(107,107,107);
  doc.text('Delivery', M, y);
  y += 20;
  doc.setFont('helvetica','bold'); doc.setFontSize(13);
  if(totalToDeliver > 0){
    doc.setTextColor(160,107,28);
    doc.text(`${totalToDeliver} item${totalToDeliver===1?'':'s'} to deliver`, M, y);
  } else {
    doc.setTextColor(58,138,79);
    doc.text('All picked up', M, y);
  }

  // Footer
  doc.setFont('helvetica','normal'); doc.setFontSize(10);
  doc.setTextColor(160,160,160);
  doc.text('— P. Ketwaroo & Sons —', W/2, H - 42, { align:'center' });

  return doc.output('blob');
}

async function shareWhatsApp(order){
  const pdfBlob = buildOrderPDF(order);
  if(!pdfBlob){
    toast('PDF still loading — try again in a sec','error');
    return;
  }

  const fname = `order-${order.id}-${(order.customer_name||'').replace(/[^a-z0-9]+/gi,'-').toLowerCase()}.pdf`;
  const file = new File([pdfBlob], fname, { type:'application/pdf' });

  if(navigator.canShare && navigator.canShare({ files: [file] })){
    try {
      await navigator.share({ files: [file], title: `Order #${order.id}` });
      return;
    } catch(err){
      if(err && err.name === 'AbortError') return;
    }
  }

  // Desktop / unsupported: download PDF and let user attach manually
  const url = URL.createObjectURL(pdfBlob);
  const a = document.createElement('a');
  a.href = url; a.download = fname;
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(url), 1000);
  toast('PDF saved — open WhatsApp and attach it','info');
}

// TOAST
// ═══════════════════════════════════════════════════════════
function toast(msg, type){
  type = type||'info';
  const el = document.createElement('div');
  el.className = 'toast '+type;
  el.textContent = msg;
  el.onclick = () => el.remove();
  document.getElementById('toasts').appendChild(el);
  setTimeout(()=>el.remove(), 3000);
}

// ═══════════════════════════════════════════════════════════
// CONFIRM MODAL
// ═══════════════════════════════════════════════════════════
function confirm(msg){
  return new Promise(resolve => {
    document.getElementById('modal-msg').textContent = msg;
    document.getElementById('modal-bg').classList.add('open');
    const yes = document.getElementById('modal-yes');
    const no  = document.getElementById('modal-no');
    function cleanup(result){ document.getElementById('modal-bg').classList.remove('open'); yes.onclick=null; no.onclick=null; resolve(result); }
    yes.onclick = ()=>cleanup(true);
    no.onclick  = ()=>cleanup(false);
  });
}

async function api(url, opts){
  const res = await fetch(url, opts);
  const data = await res.json();
  if(!res.ok) throw new Error(data.error||'Request failed');
  return data;
}

async function fetchAll(){
  try {
    const [p,o,cf,s] = await Promise.all([
      fetch('/api/products').then(r=>r.json()),
      fetch('/api/orders').then(r=>r.json()),
      fetch('/api/customers/full').then(r=>r.json()),
      fetch('/api/stats').then(r=>r.json()),
    ]);
    S.products       = Array.isArray(p)?p:[];
    S.orders         = Array.isArray(o)?o:[];
    S.customers_full = Array.isArray(cf)?cf:[];
    S.customers      = S.customers_full.map(c=>c.name).sort();
    S.stats          = (s&&!s.error)?s:{};
    render();
  } catch(e){ toast('Failed to load data','error'); }
}

async function loadCustomerDetail(name){
  S.cu_loading = true; render();
  try {
    const d = await fetch('/api/customers/'+encodeURIComponent(name)).then(r=>r.json());
    if(d && !d.error) S.cu_detail = d;
    S.cu_loading = false; render();
  } catch(e){ S.cu_loading = false; toast('Failed to load customer','error'); render(); }
}

// BADGE HELPERS
// ═══════════════════════════════════════════════════════════
function statusBadge(status){
  return `<span class="badge ${status==='loaded'?'loaded':'pending'}">${status==='loaded'?'Loaded':'Pending'}</span>`;
}
function paymentBadge(paid, total, orderId){
  paid = parseFloat(paid)||0; total = parseFloat(total)||0;
  const cls = orderId ? ' click' : '';
  const attrs = orderId ? ` data-action="toggle-paid" data-id="${orderId}" title="Click to mark paid/unpaid"` : '';
  if(total > 0 && paid >= total) return `<span class="badge paid${cls}"${attrs}>Paid</span>`;
  if(paid > 0) return `<span class="badge partial${cls}"${attrs}>Partial $${fmt(paid)}/$${fmt(total)}</span>`;
  return `<span class="badge unpaid${cls}"${attrs}>Unpaid</span>`;
}
function deliveryBadge(items){
  let totQ=0, totT=0;
  for(const i of items){ totQ += parseInt(i.quantity)||0; totT += parseInt(i.taken)||0; }
  if(totT === 0 || totQ === 0) return '';
  if(totT >= totQ) return '<span class="badge pickup">All picked up</span>';
  return `<span class="badge pickup">${totQ-totT} to deliver</span>`;
}
function deliveredBadge(deliveredAt, orderId){
  const isDelivered = !!deliveredAt;
  const cls = orderId ? ' click' : '';
  const attrs = orderId ? ` data-action="toggle-delivered" data-id="${orderId}" title="Click to toggle delivered"` : '';
  if(isDelivered){
    const date = new Date(deliveredAt).toLocaleDateString();
    return `<span class="badge delivered${cls}"${attrs}>Delivered ${date}</span>`;
  }
  return `<span class="badge undelivered${cls}"${attrs}>Not Delivered</span>`;
}
function payOptionsHTML(idPrefix, mode, customVal, total){
  return `
    <div class="pay-opts">
      <label class="pay-opt${mode==='unpaid'?' active':''}">
        <input type="radio" name="${idPrefix}-pay" value="unpaid" ${mode==='unpaid'?'checked':''}/>
        <span>Pay on delivery</span>
      </label>
      <label class="pay-opt${mode==='full'?' active':''}">
        <input type="radio" name="${idPrefix}-pay" value="full" ${mode==='full'?'checked':''}/>
        <span>Paid in full <span style="color:var(--text-3)">($${fmt(total)})</span></span>
      </label>
      <label class="pay-opt${mode==='custom'?' active':''}">
        <input type="radio" name="${idPrefix}-pay" value="custom" ${mode==='custom'?'checked':''}/>
        <span>Custom amount</span>
        <input class="input" id="${idPrefix}-pay-custom" type="number" step="0.01" min="0" value="${esc(customVal)}" placeholder="0.00" ${mode!=='custom'?'disabled':''}/>
      </label>
    </div>`;
}
function stockBadge(n){
  if(n===0) return `<span class="badge out">Out</span>`;
  if(n<5)   return `<span class="badge critical">${n}</span>`;
  if(n<10)  return `<span class="badge low">${n}</span>`;
  return n;
}
function deltaChip(curr, prev){
  curr = parseFloat(curr)||0; prev = parseFloat(prev)||0;
  if(prev <= 0){
    if(curr > 0) return `<span class="delta up">New</span>`;
    return '';
  }
  const pct = ((curr - prev) / prev) * 100;
  if(Math.abs(pct) < 0.5) return `<span class="delta flat">0%</span>`;
  const cls = pct > 0 ? 'up' : 'down';
  const arrow = pct > 0 ? '+' : '';
  return `<span class="delta ${cls}">${arrow}${pct.toFixed(0)}% vs yesterday</span>`;
}
function statCard({variant, label, value, delta}){
  return `
    <div class="stat ${variant||''}">
      <div class="stat-val">${value}</div>
      <div class="stat-lbl">${label}</div>
      ${delta || ''}
    </div>`;
}

// REPORTS
// ═══════════════════════════════════════════════════════════
function periodRange(period){
  const now = new Date();
  if(period==='today'){
    const start = new Date(now.getFullYear(), now.getMonth(), now.getDate());
    const prevStart = new Date(start); prevStart.setDate(prevStart.getDate()-1);
    return {start, end:now, prevStart, prevEnd:start};
  }
  if(period==='week'){
    const start = new Date(now.getTime() - 7*24*60*60*1000);
    return {start, end:now, prevStart:new Date(now.getTime() - 14*24*60*60*1000), prevEnd:start};
  }
  if(period==='month'){
    const start = new Date(now.getTime() - 30*24*60*60*1000);
    return {start, end:now, prevStart:new Date(now.getTime() - 60*24*60*60*1000), prevEnd:start};
  }
  return null;
}

function aggOrders(orders){
  const revenue = orders.reduce((s,o)=>s+parseFloat(o.total||0),0);
  const count = orders.length;
  return {revenue, count, avg: count?revenue/count:0};
}

function buildBuckets(period, orders){
  if(period==='today') return null;
  const idx = {}, list = [];
  if(period==='week' || period==='month'){
    const days = period==='week'?7:30;
    for(let i=days-1; i>=0; i--){
      const d = new Date(); d.setHours(0,0,0,0); d.setDate(d.getDate()-i);
      const key = d.toISOString().slice(0,10);
      const b = {key, label:d.toLocaleDateString('en-US',{month:'short',day:'numeric'}), revenue:0};
      list.push(b); idx[key]=b;
    }
    for(const o of orders){
      const k = new Date(o.created_at).toISOString().slice(0,10);
      if(idx[k]) idx[k].revenue += parseFloat(o.total||0);
    }
  } else {
    for(const o of orders){
      const d = new Date(o.created_at);
      const key = d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');
      if(!idx[key]){
        idx[key] = {key, label:d.toLocaleDateString('en-US',{month:'short',year:'2-digit'}), revenue:0};
        list.push(idx[key]);
      }
      idx[key].revenue += parseFloat(o.total||0);
    }
    list.sort((a,b)=>a.key.localeCompare(b.key));
  }
  return list;
}

function computeReports(){
  const r = periodRange(S.r_period);
  const filtered = S.orders.filter(o=>{
    if(!r) return true;
    const d = new Date(o.created_at);
    return d >= r.start && d <= r.end;
  });
  const prevOrders = r ? S.orders.filter(o=>{
    const d = new Date(o.created_at);
    return d >= r.prevStart && d < r.prevEnd;
  }) : null;

  const cur = aggOrders(filtered);
  const prev = prevOrders ? aggOrders(prevOrders) : null;

  // top customers
  const custMap = {};
  for(const o of filtered){
    const n = o.customer_name || '—';
    if(!custMap[n]) custMap[n] = {name:n, revenue:0, orders:0};
    custMap[n].revenue += parseFloat(o.total||0);
    custMap[n].orders += 1;
  }
  const topCustomers = Object.values(custMap).sort((a,b)=>b.revenue-a.revenue).slice(0,10);

  // top products
  const prodMap = {};
  for(const o of filtered){
    for(const it of parseItems(o.items)){
      if(!prodMap[it.name]) prodMap[it.name] = {name:it.name, units:0, revenue:0};
      prodMap[it.name].units += parseInt(it.quantity)||0;
      prodMap[it.name].revenue += (parseFloat(it.price)||0)*(parseInt(it.quantity)||0);
    }
  }
  const topByRev = Object.values(prodMap).sort((a,b)=>b.revenue-a.revenue).slice(0,8);
  const topByUnits = Object.values(prodMap).sort((a,b)=>b.units-a.units).slice(0,8);

  // reorder watch
  const reorder = S.products
    .filter(p => p.stock <= 10 && (prodMap[p.name]?.units||0) > 0)
    .map(p => ({...p, soldUnits: prodMap[p.name]?.units||0}))
    .sort((a,b)=>b.soldUnits-a.soldUnits)
    .slice(0,10);

  const buckets = buildBuckets(S.r_period, filtered);
  return {cur, prev, topCustomers, topByRev, topByUnits, reorder, buckets};
}

function deltaPill(curr, prev){
  if(prev===null||prev===undefined) return '';
  if(prev===0){
    if(curr===0) return '<span class="delta-flat">no prior</span>';
    return '<span class="delta-up">▲ new</span>';
  }
  const pct = ((curr-prev)/prev)*100;
  const pos = pct>=0;
  const cls = Math.abs(pct)<1 ? 'delta-flat' : (pos?'delta-up':'delta-down');
  const arrow = Math.abs(pct)<1 ? '·' : (pos?'▲':'▼');
  return `<span class="${cls}">${arrow} ${Math.abs(pct).toFixed(0)}%</span>`;
}

const shortMoney = n => {
  n = parseFloat(n)||0;
  if(n>=1000) return '$'+(n/1000).toFixed(1)+'k';
  return '$'+Math.round(n);
};

function reportsHTML(){
  const R = computeReports();
  const periods = [{id:'today',label:'Today'},{id:'week',label:'7 Days'},{id:'month',label:'30 Days'},{id:'all',label:'All Time'}];
  const maxBar = R.buckets ? Math.max(...R.buckets.map(b=>b.revenue), 1) : 1;
  const prevLabel = S.r_period==='today' ? 'yesterday' :
                    S.r_period==='week'  ? 'prev 7 days' :
                    S.r_period==='month' ? 'prev 30 days' : '';

  const dChip = (cur, prev) => {
    if(prev===null||prev===undefined||!R.prev) return '';
    return deltaChip(cur, prev);
  };
  const vs = prevLabel ? ` · vs ${prevLabel}` : '';

  return `
  <h1 class="title-display">Reports</h1>
  <div class="pills">
    ${periods.map(p=>`<div class="pill${S.r_period===p.id?' active':''}" data-r-period="${p.id}">${p.label}</div>`).join('')}
  </div>

  <div class="stats">
    ${statCard({variant:'green', label:`Revenue${vs}`, value:`$${fmt(R.cur.revenue)}`, delta:dChip(R.cur.revenue, R.prev?.revenue)})}
    ${statCard({variant:'blue',  label:`Orders${vs}`,  value:R.cur.count, delta:dChip(R.cur.count, R.prev?.count)})}
    ${statCard({variant:'amber', label:`Avg Order${vs}`, value:`$${fmt(R.cur.avg)}`, delta:dChip(R.cur.avg, R.prev?.avg)})}
  </div>

  ${R.buckets && R.buckets.length>0 ? `
  <div class="card">
    <div class="sec-title">Revenue Trend</div>
    <div class="trend-chart">
      ${R.buckets.map(b=>`
        <div class="trend-col" title="${b.label}: $${fmt(b.revenue)}">
          <div class="trend-val">${b.revenue>0?shortMoney(b.revenue):''}</div>
          <div class="trend-bar-wrap">
            <div class="trend-bar" style="height:${b.revenue?Math.max(4,(b.revenue/maxBar)*100):0}%"></div>
          </div>
          <div class="trend-label">${b.label}</div>
        </div>
      `).join('')}
    </div>
  </div>` : ''}

  <div class="report-grid">
    <div class="card">
      <div class="sec-title">Top Customers</div>
      ${R.topCustomers.length===0 ? '<p class="empty">No orders in this period.</p>' :
        R.topCustomers.map(c=>`
        <div class="rep-row">
          <span class="rep-name">${esc(c.name)}</span>
          <span class="rep-meta">${c.orders} order${c.orders===1?'':'s'}</span>
          <span class="rep-val">$${fmt(c.revenue)}</span>
        </div>`).join('')}
    </div>

    <div class="card">
      <div class="sec-title">Top Products by Revenue</div>
      ${R.topByRev.length===0 ? '<p class="empty">No orders in this period.</p>' :
        R.topByRev.map(p=>`
        <div class="rep-row">
          <span class="rep-name">${esc(p.name)}</span>
          <span class="rep-meta">${p.units} units</span>
          <span class="rep-val">$${fmt(p.revenue)}</span>
        </div>`).join('')}
    </div>

    <div class="card">
      <div class="sec-title">Top Products by Units</div>
      ${R.topByUnits.length===0 ? '<p class="empty">No orders in this period.</p>' :
        R.topByUnits.map(p=>`
        <div class="rep-row">
          <span class="rep-name">${esc(p.name)}</span>
          <span class="rep-meta">$${fmt(p.revenue)}</span>
          <span class="rep-val">${p.units}</span>
        </div>`).join('')}
    </div>
  </div>

  <div class="card">
    <div class="sec-title">Reorder Watch <span style="font-size:var(--text-xs);color:var(--text-3);font-weight:400">— stock ≤ 10 with recent sales</span></div>
    ${R.reorder.length===0 ? '<p class="empty">No items need reordering.</p>' :
      R.reorder.map(p=>`
      <div class="rep-row">
        <span class="rep-name">${esc(p.name)}</span>
        <span class="rep-meta">sold ${p.soldUnits} this period</span>
        <span class="rep-val" style="color:${p.stock<=3?'var(--red)':'var(--amber)'}">${p.stock} left</span>
      </div>`).join('')}
  </div>`;
}

const TABS = [
  {id:'dashboard',   label:'Dashboard'},
  {id:'products',    label:'Products'},
  {id:'create-order',label:'Create Order'},
  {id:'orders',      label:'Orders'},
  {id:'customers',   label:'Customers'},
  {id:'reports',     label:'Reports'},
];

function render(){
  const activeId = document.activeElement?.id;
  const selStart = document.activeElement?.selectionStart;
  const selEnd   = document.activeElement?.selectionEnd;

  // nav
  document.getElementById('nav').innerHTML = TABS.map(t=>
    `<button class="nav-btn${S.tab===t.id?' active':''}" data-tab="${t.id}">${t.label}</button>`
  ).join('');

  // content
  const main = document.getElementById('main');
  if(S.tab==='dashboard')         main.innerHTML = dashboardHTML();
  else if(S.tab==='products')     main.innerHTML = productsHTML();
  else if(S.tab==='create-order') main.innerHTML = createOrderHTML();
  else if(S.tab==='orders')       main.innerHTML = ordersHTML();
  else if(S.tab==='customers')    main.innerHTML = customersHTML();
  else if(S.tab==='reports')      main.innerHTML = reportsHTML();

  attachEvents();

  if(activeId){
    const el = document.getElementById(activeId);
    if(el){
      _restoringFocus = true;
      el.focus();
      try{ el.setSelectionRange(selStart, selEnd); }catch(_){}
      _restoringFocus = false;
    }
  }
}

// ═══════════════════════════════════════════════════════════
// EVENTS
// ═══════════════════════════════════════════════════════════
function attachEvents(){
  // tab nav
  document.querySelectorAll('[data-tab]').forEach(btn=>{
    btn.onclick = ()=>{ S.tab=btn.dataset.tab; render(); };
  });

  // search inputs (live)
  const ps = document.getElementById('p-search');
  if(ps) ps.oninput = e=>{ S.p_search=e.target.value; render(); };

  const os = document.getElementById('o-search');
  if(os) os.oninput = e=>{ S.o_search=e.target.value; render(); };

  // category pills
  document.querySelectorAll('[data-cat]').forEach(el=>{
    el.onclick = ()=>{ S.p_cat=el.dataset.cat; render(); };
  });

  // status filter pills
  document.querySelectorAll('[data-status-filter]').forEach(el=>{
    el.onclick = ()=>{ S.o_filter=el.dataset.statusFilter; render(); };
  });

  // product form inputs (track values so they survive re-render)
  ['p-name','p-cat-inp','p-price','p-stock'].forEach(id=>{
    const el = document.getElementById(id);
    if(!el) return;
    el.oninput = e=>{
      const key = {' p-name':'name','p-cat-inp':'category','p-price':'price','p-stock':'stock'}[id]||id.replace('p-','');
      const map = {'p-name':'name','p-cat-inp':'category','p-price':'price','p-stock':'stock'};
      S.p_form[map[id]] = e.target.value;
    };
  });

  // customer autocomplete
  const cc = document.getElementById('c-cust');
  if(cc){
    cc.oninput = e=>{ S.c_cust=e.target.value; S.c_cust_open=true; render(); };
    cc.onfocus = ()=>{ if(_restoringFocus) return; S.c_cust_open=true; render(); };
    cc.onblur  = ()=>setTimeout(()=>{ if(S.c_cust_open){ S.c_cust_open=false; render(); } },150);
  }

  // product search autocomplete
  const cp = document.getElementById('c-prod');
  if(cp){
    cp.oninput = e=>{ S.c_prod=e.target.value; S.c_prod_open=true; render(); };
    cp.onfocus = ()=>{ if(_restoringFocus) return; S.c_prod_open=true; render(); };
    cp.onblur  = ()=>setTimeout(()=>{ if(S.c_prod_open){ S.c_prod_open=false; render(); } },150);
  }

  // editable price + qty + taken inputs on order items
  S.c_items.forEach(item => {
    const pel = document.getElementById('c-price-'+item.id);
    if(pel) pel.onblur = e => {
      const val = parseFloat(e.target.value);
      if(!isNaN(val) && val >= 0){ item.price = val; render(); }
    };
    const qel = document.getElementById('c-qty-'+item.id);
    if(qel) qel.onblur = e => {
      const val = parseInt(e.target.value);
      if(!isNaN(val) && val > 0){ item.qty = val; if((item.taken||0)>val) item.taken=val; render(); }
      else if(!isNaN(val) && val <= 0){ S.c_items = S.c_items.filter(i=>i.id!==item.id); render(); }
    };
    const tel = document.getElementById('c-taken-'+item.id);
    if(tel) tel.onblur = e => {
      const val = parseInt(e.target.value);
      item.taken = isNaN(val) ? 0 : Math.max(0, Math.min(item.qty, val));
      render();
    };
  });

  // create-order payment radios + custom amount
  document.querySelectorAll('input[name="c-pay"]').forEach(r=>{
    r.onchange = e => { S.c_pay_mode = e.target.value; render(); };
  });

  // scan-list file input
  const sf = document.getElementById('scan-file');
  if(sf) sf.onchange = async e => {
    const file = e.target.files && e.target.files[0];
    if(!file) return;
    if(!file.type.startsWith('image/')){ toast('Pick an image file','error'); return; }
    S.scan_busy=true; S.scan_error=''; S.scan_results=null; render();
    try {
      const { dataUrl, base64, mime } = await downsizeImage(file, 1600, 0.85);
      S.scan_preview = dataUrl;
      const res = await fetch('/api/scan-list', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ image: base64, mime_type: mime })
      });
      const data = await res.json();
      if(!res.ok) throw new Error(data.error || 'Scan failed');
      S.scan_results = data;
      if(!data.items || data.items.length === 0){
        S.scan_error = 'Could not read any items from that photo. Try a clearer, brighter shot.';
      }
    } catch(err) {
      S.scan_error = err.message;
    } finally {
      S.scan_busy=false; sf.value=''; render();
    }
  };
  const cpc = document.getElementById('c-pay-custom');
  if(cpc) cpc.onblur = e => {
    const v = parseFloat(e.target.value);
    S.c_pay_custom = (isNaN(v) || v < 0) ? '' : String(v);
  };

  // edit-order product search autocomplete
  const oep = document.getElementById('oe-prod');
  if(oep){
    oep.oninput = e=>{ S.o_edit_prod=e.target.value; S.o_edit_prod_open=true; render(); };
    oep.onfocus = ()=>{ if(_restoringFocus) return; S.o_edit_prod_open=true; render(); };
    oep.onblur  = ()=>setTimeout(()=>{ if(S.o_edit_prod_open){ S.o_edit_prod_open=false; render(); } },150);
  }

  // edit-order customer name autocomplete
  const oen = document.getElementById('oe-name');
  if(oen){
    oen.oninput = e=>{ S.o_edit_name=e.target.value; S.o_edit_name_open=true; render(); };
    oen.onfocus = ()=>{ if(_restoringFocus) return; S.o_edit_name_open=true; render(); };
    oen.onblur  = ()=>setTimeout(()=>{ if(S.o_edit_name_open){ S.o_edit_name_open=false; render(); } },150);
  }

  // editable price + qty + taken inputs on edit-order items (onblur to avoid cursor issues with type=number)
  S.o_edit_items.forEach(item=>{
    const pel = document.getElementById('oe-price-'+item.id);
    if(pel) pel.onblur = e=>{
      const val = parseFloat(e.target.value);
      if(!isNaN(val) && val>=0){ item.price=val; render(); }
    };
    const qel = document.getElementById('oe-qty-'+item.id);
    if(qel) qel.onblur = e=>{
      const val = parseInt(e.target.value);
      if(!isNaN(val) && val>0){ item.quantity=val; if((item.taken||0)>val) item.taken=val; render(); }
      else if(!isNaN(val) && val<=0){ S.o_edit_items=S.o_edit_items.filter(i=>i.id!==item.id); render(); }
    };
    const tel = document.getElementById('oe-taken-'+item.id);
    if(tel) tel.onblur = e=>{
      const val = parseInt(e.target.value);
      item.taken = isNaN(val) ? 0 : Math.max(0, Math.min(item.quantity, val));
      render();
    };
  });

  // edit-order payment radios + custom amount
  document.querySelectorAll('input[name="oe-pay"]').forEach(r=>{
    r.onchange = e => { S.o_edit_pay_mode = e.target.value; render(); };
  });
  const oepc = document.getElementById('oe-pay-custom');
  if(oepc) oepc.onblur = e => {
    const v = parseFloat(e.target.value);
    S.o_edit_pay_custom = (isNaN(v) || v < 0) ? '' : String(v);
  };

  // reports period pills
  document.querySelectorAll('[data-r-period]').forEach(el=>{
    el.onclick = ()=>{ S.r_period=el.dataset.rPeriod; render(); };
  });

  // customers search + inputs
  const cus = document.getElementById('cu-search');
  if(cus) cus.oninput = e=>{ S.cu_search = e.target.value; render(); };
  const cpa = document.getElementById('cu-pay-amount');
  if(cpa) cpa.oninput = e=>{ S.cu_pay_amount = e.target.value; };
  const cpn = document.getElementById('cu-pay-note');
  if(cpn) cpn.oninput = e=>{ S.cu_pay_note = e.target.value; };
  const cen = document.getElementById('cu-edit-name');
  if(cen) cen.oninput = e=>{ S.cu_edit_name = e.target.value; };
  const cep = document.getElementById('cu-edit-phone');
  if(cep) cep.oninput = e=>{ S.cu_edit_phone = e.target.value; };
  const cnt = document.getElementById('cu-edit-notes');
  if(cnt) cnt.oninput = e=>{ S.cu_edit_notes = e.target.value; };

  // dropdown picks: use onmousedown + preventDefault so blur can't close the list first
  document.querySelectorAll('[data-action="pick-cust"],[data-action="pick-prod"],[data-action="oe-pick-prod"],[data-action="oe-pick-cust"]').forEach(el=>{
    el.onmousedown = e=>{ e.preventDefault(); handleAction(e, el); };
  });

  // all other click actions
  document.querySelectorAll('[data-action]:not([data-action="pick-cust"]):not([data-action="pick-prod"]):not([data-action="oe-pick-prod"]):not([data-action="oe-pick-cust"])').forEach(el=>{
    el.onclick = e=>handleAction(e, el);
  });
  document.querySelectorAll('[data-action="toggle-item"]').forEach(el=>{
    el.onchange = e=>handleAction(e,el);
  });
  // scan-toggle (checkbox) needs change, scan-qty (number input) needs change too
  document.querySelectorAll('[data-action="scan-toggle"],[data-action="scan-qty"]').forEach(el=>{
    el.onchange = e=>handleAction(e,el);
  });
}

async function handleAction(e, el){
  const a = el.dataset.action;

  if(a==='go-orders'){ S.tab='orders'; render(); }

  // ── products ──
  else if(a==='save-product'){
    const name = document.getElementById('p-name').value.trim();
    const cat  = document.getElementById('p-cat-inp').value.trim();
    const price= parseFloat(document.getElementById('p-price').value);
    const stock= parseInt(document.getElementById('p-stock').value);
    if(!name||!cat||isNaN(price)||isNaN(stock)) return toast('All fields required','error');
    try {
      const url = S.p_editId?'/api/products/'+S.p_editId:'/api/products';
      await api(url,{method:S.p_editId?'PUT':'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name,category:cat,price,stock})});
      toast(S.p_editId?'Product updated':'Product added','success');
      S.p_editId=null; S.p_form={name:'',category:'',price:'',stock:''};
      await fetchAll();
    } catch(err){ toast(err.message,'error'); }
  }
  else if(a==='cancel-edit'){ S.p_editId=null; S.p_form={name:'',category:'',price:'',stock:''}; render(); }
  else if(a==='edit-product'){
    const p = S.products.find(x=>x.id==el.dataset.id);
    if(!p) return;
    S.p_editId=p.id; S.p_form={name:p.name,category:p.category,price:p.price,stock:p.stock}; render();
  }
  else if(a==='del-product'){
    if(!await confirm('Delete "'+el.dataset.name+'"?')) return;
    try{ await api('/api/products/'+el.dataset.id,{method:'DELETE'}); toast('Deleted','success'); await fetchAll(); }
    catch(err){ toast(err.message,'error'); }
  }

  // ── create order ──
  else if(a==='pick-cust'){ S.c_cust=el.dataset.val; S.c_cust_open=false; render(); }
  else if(a==='pick-prod'){
    const id=parseInt(el.dataset.id), name=el.dataset.name, price=parseFloat(el.dataset.price);
    const ex = S.c_items.find(i=>i.id===id);
    if(ex) ex.qty++; else S.c_items.push({id,name,price,qty:1,taken:0});
    S.c_prod=''; S.c_prod_open=false; render();
  }
  else if(a==='qty-minus'){
    const id=parseInt(el.dataset.id), it=S.c_items.find(i=>i.id===id);
    if(it){ it.qty--; if(it.qty<1) S.c_items=S.c_items.filter(i=>i.id!==id); render(); }
  }
  else if(a==='qty-plus'){
    const it=S.c_items.find(i=>i.id===parseInt(el.dataset.id));
    if(it){ it.qty++; render(); }
  }
  else if(a==='remove-item'){ S.c_items=S.c_items.filter(i=>i.id!==parseInt(el.dataset.id)); render(); }
  else if(a==='scan-open'){
    S.scan_open=true; S.scan_results=null; S.scan_error=''; S.scan_preview=null; render();
  }
  else if(a==='scan-close' || a==='scan-close-bg'){
    if(a==='scan-close-bg' && el.tagName !== 'DIV') return;
    S.scan_open=false; S.scan_results=null; S.scan_error=''; S.scan_preview=null; render();
  }
  else if(a==='scan-pick'){
    document.getElementById('scan-file').click();
  }
  else if(a==='scan-toggle'){
    const i=parseInt(el.dataset.i);
    if(S.scan_results && S.scan_results.items[i]){
      S.scan_results.items[i]._skip = !el.checked;
    }
  }
  else if(a==='scan-qty'){
    const i=parseInt(el.dataset.i);
    if(S.scan_results && S.scan_results.items[i]){
      S.scan_results.items[i].qty = Math.max(1, parseInt(el.value)||1);
    }
  }
  else if(a==='scan-add'){
    if(!S.scan_results) return;
    let added=0, skipped=0;
    for(const it of S.scan_results.items){
      if(it._skip || !it.product_id) { if(!it.product_id) skipped++; continue; }
      const ex=S.c_items.find(x=>x.id===it.product_id);
      if(ex) ex.qty += it.qty;
      else S.c_items.push({id:it.product_id, name:it.name, price:it.price, qty:it.qty, taken:0});
      added++;
    }
    S.scan_open=false; S.scan_results=null; S.scan_preview=null;
    toast(`Added ${added} item${added===1?'':'s'}${skipped?` (${skipped} skipped — no match)`:''}`, added>0?'success':'error');
    render();
  }
  else if(a==='place-order'){
    if(!S.c_cust.trim()) return toast('Customer name required','error');
    if(!S.c_items.length) return toast('Add at least one item','error');
    const total = S.c_items.reduce((s,i)=>s+i.price*i.qty,0);
    const paid = S.c_pay_mode==='full' ? total :
                 S.c_pay_mode==='custom' ? Math.max(0, parseFloat(S.c_pay_custom)||0) : 0;
    try{
      await api('/api/orders',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({
        customer_name:S.c_cust.trim(),
        items:S.c_items.map(i=>({id:i.id,name:i.name,price:i.price,quantity:i.qty,taken:Math.max(0,Math.min(i.qty,parseInt(i.taken)||0))})),
        subtotal:total,tax:0,total,amount_paid:paid
      })});
      toast('Order created!','success');
      S.c_cust=''; S.c_items=[]; S.c_pay_mode='unpaid'; S.c_pay_custom='';
      await fetchAll();
    } catch(err){ toast(err.message,'error'); }
  }

  // ── orders ──
  else if(a==='toggle-delivered'){
    e.stopPropagation();
    const orderId=parseInt(el.dataset.id), order=S.orders.find(o=>o.id===orderId);
    if(!order) return;
    const nowDelivered = !order.delivered_at;
    order.delivered_at = nowDelivered ? new Date().toISOString() : null;
    render();
    try{
      await fetch('/api/orders/'+orderId+'/delivered',{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({delivered:nowDelivered})});
      toast(nowDelivered?'Marked delivered':'Marked not delivered','success');
    } catch(err){ toast('Update failed','error'); await fetchAll(); }
  }
  else if(a==='toggle-paid'){
    e.stopPropagation();
    const orderId=parseInt(el.dataset.id), order=S.orders.find(o=>o.id===orderId);
    if(!order) return;
    const total = parseFloat(order.total)||0;
    const paid  = parseFloat(order.amount_paid)||0;
    const newPaid = paid >= total && total > 0 ? 0 : total;
    order.amount_paid = newPaid; render();
    try{
      await fetch('/api/orders/'+orderId+'/paid',{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({amount_paid:newPaid})});
      toast(newPaid>0?'Marked paid':'Marked unpaid','success');
    } catch(err){ toast('Update failed','error'); await fetchAll(); }
  }
  else if(a==='toggle-order'){
    const id=parseInt(el.dataset.id);
    if(S.o_editing && S.o_editing!==id){ S.o_editing=null; S.o_edit_items=[]; S.o_edit_prod=''; }
    S.o_expanded = S.o_expanded===id?null:id; render();
  }
  else if(a==='start-edit-order'){
    const orderId=parseInt(el.dataset.id);
    const order=S.orders.find(o=>o.id===orderId);
    if(!order) return;
    S.o_editing=orderId;
    S.o_edit_items=parseItems(order.items).map(i=>({
      id:i.id, name:i.name,
      price:parseFloat(i.price)||0,
      quantity:parseInt(i.quantity)||0,
      taken:parseInt(i.taken)||0
    }));
    S.o_edit_name=order.customer_name||''; S.o_edit_name_open=false;
    const ototal = parseFloat(order.total)||0, opaid = parseFloat(order.amount_paid)||0;
    if(opaid <= 0) { S.o_edit_pay_mode='unpaid'; S.o_edit_pay_custom=''; }
    else if(opaid >= ototal) { S.o_edit_pay_mode='full'; S.o_edit_pay_custom=''; }
    else { S.o_edit_pay_mode='custom'; S.o_edit_pay_custom=String(opaid); }
    S.o_edit_prod=''; S.o_edit_prod_open=false; S.o_expanded=orderId; render();
  }
  else if(a==='cancel-edit-order'){
    S.o_editing=null; S.o_edit_items=[]; S.o_edit_prod='';
    S.o_edit_name=''; S.o_edit_name_open=false;
    S.o_edit_pay_mode='unpaid'; S.o_edit_pay_custom=''; render();
  }
  else if(a==='oe-pick-cust'){ S.o_edit_name=el.dataset.val; S.o_edit_name_open=false; render(); }
  else if(a==='oe-qty-minus'){
    const id=parseInt(el.dataset.id), it=S.o_edit_items.find(i=>i.id===id);
    if(it){ it.quantity--; if(it.quantity<1) S.o_edit_items=S.o_edit_items.filter(i=>i.id!==id); render(); }
  }
  else if(a==='oe-qty-plus'){
    const id=parseInt(el.dataset.id), it=S.o_edit_items.find(i=>i.id===id);
    if(it){ it.quantity++; render(); }
  }
  else if(a==='oe-remove'){
    S.o_edit_items=S.o_edit_items.filter(i=>i.id!==parseInt(el.dataset.id)); render();
  }
  else if(a==='oe-pick-prod'){
    const id=parseInt(el.dataset.id), name=el.dataset.name, price=parseFloat(el.dataset.price);
    const ex=S.o_edit_items.find(i=>i.id===id);
    if(ex) ex.quantity++; else S.o_edit_items.push({id,name,price,quantity:1,taken:0});
    S.o_edit_prod=''; S.o_edit_prod_open=false; render();
  }
  else if(a==='save-edit-order'){
    const orderId=parseInt(el.dataset.id);
    if(!S.o_edit_items.length) return toast('Add at least one item','error');
    if(!S.o_edit_name.trim()) return toast('Customer name required','error');
    const total = S.o_edit_items.reduce((s,i)=>s+i.price*i.quantity,0);
    const paid = S.o_edit_pay_mode==='full' ? total :
                 S.o_edit_pay_mode==='custom' ? Math.max(0, parseFloat(S.o_edit_pay_custom)||0) : 0;
    const itemsOut = S.o_edit_items.map(i=>({
      id:i.id, name:i.name, price:i.price, quantity:i.quantity,
      taken:Math.max(0,Math.min(i.quantity,parseInt(i.taken)||0))
    }));
    try{
      await api('/api/orders/'+orderId,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({
        items:itemsOut, customer_name:S.o_edit_name.trim(), amount_paid:paid
      })});
      S.o_editing=null; S.o_edit_items=[]; S.o_edit_prod='';
      S.o_edit_name=''; S.o_edit_name_open=false;
      S.o_edit_pay_mode='unpaid'; S.o_edit_pay_custom='';
      toast('Order updated','success');
      await fetchAll();
    } catch(err){ toast(err.message,'error'); }
  }
  else if(a==='toggle-item'){
    const orderId=parseInt(el.dataset.orderId), idx=parseInt(el.dataset.idx);
    const order = S.orders.find(o=>o.id===orderId);
    if(!order) return;
    const items = parseItems(order.items).map((it,i)=>{
      const q = parseInt(it.quantity)||0, t = parseInt(it.taken)||0;
      if(t >= q) return {...it, loaded:true};
      return i===idx ? {...it,loaded:!it.loaded} : it;
    });
    const status = items.every(it=>it.loaded)?'loaded':'pending';
    order.items=JSON.stringify(items); order.status=status; render();
    try{ await fetch('/api/orders/'+orderId+'/items',{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({items,status})}); }
    catch(err){ toast('Update failed','error'); await fetchAll(); }
  }
  else if(a==='mark-all'){
    const orderId=parseInt(el.dataset.id), order=S.orders.find(o=>o.id===orderId);
    if(!order) return;
    const items = parseItems(order.items).map(it=>({...it,loaded:true}));
    order.items=JSON.stringify(items); order.status='loaded'; render();
    try{ await fetch('/api/orders/'+orderId+'/items',{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({items,status:'loaded'})}); toast('Marked as loaded','success'); }
    catch(err){ toast('Update failed','error'); await fetchAll(); }
  }
  else if(a==='del-order'){
    if(!await confirm('Delete this order?')) return;
    try{ await api('/api/orders/'+el.dataset.id,{method:'DELETE'}); toast('Deleted','success'); await fetchAll(); }
    catch(err){ toast(err.message,'error'); }
  }
  else if(a==='share-whatsapp'){
    const order = S.orders.find(o=>o.id===parseInt(el.dataset.id));
    if(order) shareWhatsApp(order);
  }
  else if(a==='share-pdf'){
    const order = S.orders.find(o=>o.id===parseInt(el.dataset.id));
    if(order) sharePDF(order);
  }

  // ── customers ──
  else if(a==='toggle-customer'){
    const name = el.dataset.name;
    if(S.cu_expanded === name){
      S.cu_expanded = null; S.cu_detail = null; S.cu_editing = false; render();
    } else {
      S.cu_expanded = name; S.cu_detail = null; S.cu_editing = false;
      S.cu_pay_amount = ''; S.cu_pay_note = '';
      loadCustomerDetail(name); // sets loading and renders
    }
  }
  else if(a==='start-edit-customer'){
    if(!S.cu_detail) return;
    S.cu_editing = true;
    S.cu_edit_name = S.cu_detail.name;
    S.cu_edit_phone = S.cu_detail.phone || '';
    S.cu_edit_notes = S.cu_detail.notes || '';
    render();
  }
  else if(a==='cancel-edit-customer'){
    S.cu_editing = false; render();
  }
  else if(a==='save-customer'){
    const oldName = el.dataset.name;
    const newName = (S.cu_edit_name||'').trim();
    if(!newName) return toast('Name required','error');
    try{
      if(newName !== oldName){
        await api('/api/customers/'+encodeURIComponent(oldName)+'/rename',{
          method:'PUT', headers:{'Content-Type':'application/json'},
          body: JSON.stringify({new_name:newName})
        });
      }
      await api('/api/customers/'+encodeURIComponent(newName)+'/meta',{
        method:'PUT', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({phone:S.cu_edit_phone, notes:S.cu_edit_notes})
      });
      S.cu_editing = false;
      S.cu_expanded = newName;
      toast('Saved','success');
      await fetchAll();
      await loadCustomerDetail(newName);
    } catch(err){ toast(err.message,'error'); }
  }
  else if(a==='log-payment' || a==='log-payment-full'){
    const name = el.dataset.name;
    const amount = a==='log-payment-full'
      ? parseFloat(el.dataset.amount)
      : parseFloat(S.cu_pay_amount);
    if(!amount || amount <= 0) return toast('Enter a valid amount','error');
    try{
      await api('/api/customers/'+encodeURIComponent(name)+'/payments',{
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({amount, note:S.cu_pay_note})
      });
      S.cu_pay_amount = ''; S.cu_pay_note = '';
      toast('Payment logged','success');
      await fetchAll();
      await loadCustomerDetail(name);
    } catch(err){ toast(err.message,'error'); }
  }
  else if(a==='del-payment'){
    if(!await confirm('Delete this payment? Order balances will be restored.')) return;
    const id = parseInt(el.dataset.id);
    const name = el.dataset.name;
    try{
      await api('/api/payments/'+id,{method:'DELETE'});
      toast('Payment deleted','success');
      await fetchAll();
      await loadCustomerDetail(name);
    } catch(err){ toast(err.message,'error'); }
  }
  else if(a==='goto-customer-orders'){
    const name = el.dataset.name;
    S.tab = 'orders';
    S.o_search = name;
    S.o_filter = 'all';
    render();
  }
}

// ═══════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════
render();
fetchAll();
</script>
</body>
